<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nemo Harness</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nemo">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1f1e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: #0d2b29;
            padding: 8px 12px;
            border-bottom: 1px solid #134e4a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            z-index: 200;
        }

        #sidebar-toggle {
            background: none; border: none; font-size: 18px; cursor: pointer;
            color: #aaa; padding: 4px 6px; border-radius: 4px; flex-shrink: 0; line-height: 1;
        }
        #sidebar-toggle:hover { color: #fff; background: rgba(255,255,255,0.08); }

        header h1 {
            font-size: 16px; font-weight: 600; color: #14b8a6;
            display: flex; align-items: center; gap: 6px;
            flex-shrink: 0; white-space: nowrap;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; flex-shrink: 0; }
        .status-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80, 0 0 12px rgba(74,222,128,0.4); animation: glow 2s ease-in-out infinite alternate; }
        .status-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
        @keyframes glow { from { box-shadow: 0 0 4px #4ade80, 0 0 8px rgba(74,222,128,0.3); } to { box-shadow: 0 0 8px #4ade80, 0 0 16px rgba(74,222,128,0.5); } }

        #model-select {
            background: #0a1f1e; border: 1px solid #134e4a; color: #aaa;
            font-size: 11px; padding: 3px 6px; border-radius: 4px; max-width: 200px;
            flex-shrink: 1; min-width: 0;
        }

        #mode-select {
            background: #0a1f1e; border: 1px solid #134e4a; color: #14b8a6;
            font-size: 11px; padding: 3px 6px; border-radius: 4px; max-width: 120px;
            flex-shrink: 0; font-weight: 500;
        }

        .header-spacer { flex: 1; }

        .header-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #aaa; padding: 4px; flex-shrink: 0; line-height: 1; }
        .header-btn:hover { color: #fff; }
        #mute-toggle { opacity: 0.6; }
        #mute-toggle:hover { opacity: 1; }
        #mute-toggle.muted { color: #f87171; opacity: 0.8; }
        #theme-toggle { font-size: 18px; }
        #theme-toggle:hover { transform: scale(1.15); }

        /* ===== SIDEBAR ===== */
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; }
        #sidebar-overlay.active { display: block; }

        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
            background: #0d2b29; border-right: 1px solid #134e4a; z-index: 310;
            transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 12px; border-bottom: 1px solid #134e4a;
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .sidebar-header h2 { font-size: 14px; font-weight: 600; color: #14b8a6; flex: 1; }

        .sidebar-tabs {
            display: flex; border-bottom: 1px solid #134e4a; flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1; padding: 8px; text-align: center; font-size: 12px; color: #888;
            cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent;
        }
        .sidebar-tab.active { color: #14b8a6; border-bottom-color: #14b8a6; }
        .sidebar-tab:hover { color: #ccc; }

        #new-convo-btn {
            background: #14b8a6; color: #fff; border: none; font-size: 11px;
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: 500;
        }
        #new-convo-btn:hover { background: #0d9488; }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }

        .convo-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px;
        }
        .convo-item:hover { background: rgba(20,184,166,0.08); }
        .convo-item.active { background: rgba(20,184,166,0.15); }
        .convo-title { flex: 1; font-size: 13px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .convo-item.active .convo-title { color: #14b8a6; }
        .convo-date { font-size: 10px; color: #666; flex-shrink: 0; }
        .convo-delete { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
        .convo-item:hover .convo-delete { opacity: 0.7; }
        .convo-delete:hover { opacity: 1 !important; color: #f87171; }

        /* ===== MEMORY PANEL ===== */
        .memory-item {
            padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
            background: rgba(20,184,166,0.04); border: 1px solid rgba(20,184,166,0.1);
        }
        .memory-item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .memory-type { font-size: 9px; text-transform: uppercase; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
        .memory-type.user { background: #1e3a5f; color: #60a5fa; }
        .memory-type.feedback { background: #3f2a1e; color: #fbbf24; }
        .memory-type.project { background: #1e3f2a; color: #34d399; }
        .memory-type.reference { background: #2a1e3f; color: #a78bfa; }
        .memory-name { font-size: 12px; color: #ccc; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .memory-content { font-size: 11px; color: #888; line-height: 1.4; max-height: 60px; overflow: hidden; }
        .memory-delete { background: none; border: none; color: #666; cursor: pointer; font-size: 12px; padding: 2px; border-radius: 3px; }
        .memory-delete:hover { color: #f87171; }

        #memory-add-btn {
            width: 100%; padding: 6px; margin-top: 4px; background: rgba(20,184,166,0.1);
            border: 1px dashed rgba(20,184,166,0.3); border-radius: 6px; color: #14b8a6;
            font-size: 11px; cursor: pointer;
        }
        #memory-add-btn:hover { background: rgba(20,184,166,0.15); }

        /* ===== SETTINGS PANEL ===== */
        #settings-panel {
            display: none; background: #0d2b29; border-bottom: 1px solid #134e4a;
            padding: 12px 16px; font-size: 12px; flex-shrink: 0;
        }
        #settings-panel.open { display: block; }
        #settings-panel label { display: block; color: #aaa; margin-bottom: 4px; margin-top: 8px; }
        #settings-panel label:first-child { margin-top: 0; }
        #settings-panel input, #settings-panel textarea {
            width: 100%; background: #0a1f1e; border: 1px solid #134e4a; color: #eee;
            padding: 6px 8px; border-radius: 4px; font-size: 12px; font-family: inherit;
        }
        #settings-panel textarea { resize: vertical; min-height: 60px; }
        .settings-row { display: flex; gap: 12px; }
        .settings-row > div { flex: 1; }
        #settings-panel button {
            margin-top: 8px; background: #14b8a6; color: #fff; border: none;
            padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        #model-info {
            font-size: 11px; color: #666; padding: 2px 12px; background: #0d2b29;
            border-bottom: 1px solid #134e4a; flex-shrink: 0;
            display: flex; align-items: center; gap: 8px;
        }
        .breaker-badge {
            font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
        }
        .breaker-badge.closed { background: #1e3f2a; color: #34d399; }
        .breaker-badge.open { background: #3f1e1e; color: #f87171; }
        .breaker-badge.half-open { background: #3f3a1e; color: #fbbf24; }

        /* ===== CHAT ===== */
        #chat {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .message {
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            line-height: 1.5; word-wrap: break-word; overflow-wrap: break-word;
            min-width: 0; position: relative;
        }
        .message.user { background: #134e4a; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.assistant { background: #0d2b29; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.reasoning { background: #1a1a30; border-left: 3px solid #6366f1; align-self: flex-start; font-size: 13px; color: #a5b4fc; max-width: 90%; }
        .message.system-action { background: rgba(20,184,166,0.08); border-left: 3px solid #14b8a6; align-self: flex-start; font-size: 12px; color: #14b8a6; max-width: 90%; padding: 6px 10px; }
        .message.typing { color: #888; font-style: italic; }

        /* ===== PROCESS LOG (tool activity) ===== */
        .process-log { font-size: 12px; line-height: 1.8; }
        .process-log .step { display: flex; align-items: center; gap: 6px; opacity: 0.6; transition: opacity 0.3s; }
        .process-log .step.active { opacity: 1; }
        .process-log .step.done { opacity: 0.5; }
        .process-log .step-icon { width: 14px; text-align: center; flex-shrink: 0; }
        .process-log .step-icon.spin { animation: spin 1s linear infinite; display: inline-block; }
        .process-log .step-text { color: #aaa; }
        .process-log .step.tool .step-text { color: #14b8a6; }
        .process-log .step.tool-done .step-text { color: #4ade80; }
        .process-log .step.error .step-text { color: #f87171; }
        .process-log .artifact-card { max-width: 280px; margin: 6px 0 2px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ===== MESSAGE ACTIONS ===== */
        .copy-btn { position: absolute; bottom: 6px; right: 8px; background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; }
        .message:hover .copy-btn, .copy-btn:active { opacity: 1; }
        @media (hover: none) { .copy-btn { opacity: 0.5; } }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #aaa; }
        .copy-btn.copied { color: #4ade80; opacity: 1; }

        .eval-btns { position: absolute; bottom: 6px; right: 52px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
        .message:hover .eval-btns { opacity: 1; }
        .eval-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; opacity: 0.5; transition: opacity 0.15s; }
        .eval-btn:hover:not(:disabled) { opacity: 1; background: rgba(255,255,255,0.08); }
        .eval-btn.eval-selected { opacity: 1; }
        .eval-btn:disabled { cursor: default; }

        .regen-btn { position: absolute; bottom: -18px; right: 8px; background: none; border: none; font-size: 11px; color: #14b8a6; opacity: 0; cursor: pointer; padding: 2px 6px; line-height: 1; transition: opacity 0.15s; white-space: nowrap; }
        .message.assistant:hover .regen-btn { opacity: 0.7; }
        .regen-btn:hover { opacity: 1 !important; }

        .edit-btn { position: absolute; bottom: -18px; right: 0; background: none; border: none; font-size: 11px; color: #14b8a6; opacity: 0; cursor: pointer; padding: 2px 6px; line-height: 1; transition: opacity 0.15s; white-space: nowrap; }
        .message.user:hover .edit-btn { opacity: 0.7; }
        .edit-btn:hover { opacity: 1 !important; }

        /* ===== MARKDOWN ===== */
        .message.assistant h1, .message.assistant h2, .message.assistant h3 { margin: 12px 0 8px 0; font-weight: 600; }
        .message.assistant h1 { font-size: 1.3em; }
        .message.assistant h2 { font-size: 1.15em; }
        .message.assistant h3 { font-size: 1.05em; }
        .message.assistant ul, .message.assistant ol { margin: 8px 0; padding-left: 24px; }
        .message.assistant li { margin: 4px 0; }
        .message.assistant blockquote { border-left: 3px solid #14b8a6; padding-left: 12px; margin: 8px 0; color: #aaa; }
        .message.assistant a { color: #60a5fa; text-decoration: none; }
        .message.assistant a:hover { text-decoration: underline; }
        .message.assistant strong { color: #fff; }
        .message.assistant hr { border: none; border-top: 1px solid #374151; margin: 12px 0; }
        .message.assistant .table-wrap { overflow-x: auto; margin: 8px 0; -webkit-overflow-scrolling: touch; }
        .message.assistant table { border-collapse: collapse; width: 100%; }
        .message.assistant th, .message.assistant td { border: 1px solid #374151; padding: 6px 10px; text-align: left; }
        .message.assistant th { background: #374151; }
        .message.assistant img { max-width: 100%; border-radius: 8px; margin: 8px 0; cursor: pointer; }
        .message.assistant pre { background: #071515; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .message.assistant code { font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace; font-size: 13px; }
        .message.assistant p code { background: #071515; padding: 2px 6px; border-radius: 4px; }

        .token-badge { font-size: 10px; color: #666; margin-top: 4px; padding: 2px 8px; display: inline-block; }

        /* ===== ARTIFACT CARDS IN CHAT ===== */
        .artifact-card { display: flex; align-items: center; gap: 10px; background: #134e4a; border: 1px solid #1a6b66; border-radius: 10px; padding: 10px 12px; margin: 6px 0; cursor: pointer; transition: background 0.15s; max-width: 320px; }
        .artifact-card:hover { background: #1a6b66; }
        .artifact-card-icon { font-size: 20px; flex-shrink: 0; }
        .artifact-card-info { flex: 1; min-width: 0; }
        .artifact-card-name { font-size: 13px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artifact-card-type { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .artifact-card-view { background: rgba(20,184,166,0.15); border: 1px solid rgba(20,184,166,0.3); color: #14b8a6; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; flex-shrink: 0; white-space: nowrap; }

        /* ===== INPUT AREA ===== */
        #input-area {
            padding: 12px 16px; background: #0d2b29; border-top: 1px solid #134e4a;
            display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
        }
        #message-input {
            flex: 1; min-width: 0; background: #0a1f1e; border: 1px solid #134e4a;
            border-radius: 20px; padding: 10px 14px; color: #eee; font-size: 14px;
            outline: none; resize: none; min-height: 40px; max-height: 120px; font-family: inherit;
        }
        #message-input:focus { border-color: #14b8a6; }
        #send-btn {
            background: #14b8a6; color: white; border: none; border-radius: 50%;
            width: 40px; height: 40px; min-width: 40px; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }
        #send-btn:disabled { background: #555; cursor: not-allowed; }
        #send-btn:active:not(:disabled) { transform: scale(0.95); }

        #upload-btn {
            background: #134e4a; color: #aaa; border: none; border-radius: 50%;
            width: 40px; height: 40px; min-width: 40px; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #upload-btn:hover { background: #0f4a47; color: #fff; }

        .sidebar-actions {
            display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #1a3a38;
        }
        .sidebar-actions button {
            flex: 1; background: rgba(20,184,166,0.08); border: 1px solid #134e4a; color: #999;
            border-radius: 6px; padding: 6px 0; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .sidebar-actions button:hover { background: rgba(20,184,166,0.15); color: #ccc; border-color: #14b8a6; }
        #clear-btn:hover { border-color: #f87171 !important; color: #f87171 !important; }
        #fetch-btn.fetching { border-color: #fbbf24; color: #fbbf24; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .message.fetch-context { background: rgba(96,165,250,0.08); border-left: 3px solid #60a5fa; align-self: flex-start; font-size: 12px; color: #93c5fd; max-width: 90%; padding: 6px 10px; }
        .fetch-context-header { font-weight: 600; margin-bottom: 4px; color: #60a5fa; font-size: 11px; }
        .fetch-context-body { max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
        .fetch-context-meta { font-size: 10px; color: #666; margin-top: 4px; }

        /* ===== FILE UPLOAD ===== */
        #file-input { display: none; }
        .file-preview {
            background: #134e4a; border-radius: 8px; padding: 8px 12px;
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .file-preview .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-preview .remove { color: #f87171; cursor: pointer; font-size: 16px; }
        .file-preview .size { color: #888; font-size: 11px; }
        .drop-zone { border: 2px dashed #134e4a; background: rgba(15, 52, 96, 0.2); }

        /* ===== IMAGE MODAL ===== */
        .image-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        .image-modal img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .image-modal.active { display: flex; }

        /* ===== SCROLL TO BOTTOM ===== */
        #scroll-bottom-btn {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 36px; border-radius: 50%;
            background: #f5f5f0; border: 1px solid #e0e0dc; color: #333;
            font-size: 18px; cursor: pointer; display: none; align-items: center;
            justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 100;
        }
        #scroll-bottom-btn.visible { display: flex; }
        #scroll-bottom-btn:hover { background: #eaeae5; transform: translateX(-50%) scale(1.05); }

        /* ===== ARTIFACT BOTTOM SHEET ===== */
        #artifact-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            width: 100%; max-width: 100vw; height: 50vh;
            background: #0d2b29; border-top: 2px solid #14b8a6;
            border-radius: 16px 16px 0 0; z-index: 500;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden; box-sizing: border-box;
        }
        #artifact-sheet.open { transform: translateY(0); }
        #artifact-sheet.fullscreen { height: calc(100vh - env(safe-area-inset-top, 44px)) !important; border-radius: 12px 12px 0 0; }
        .artifact-handle-bar {
            display: flex; justify-content: center; align-items: center;
            min-height: 44px; cursor: grab; flex-shrink: 0;
            touch-action: none; user-select: none;
        }
        .artifact-handle-bar::after {
            content: ''; display: block;
            width: 48px; height: 5px;
            background: #2a4a47; border-radius: 3px;
        }
        .artifact-header {
            display: flex; align-items: center;
            padding: 0 10px 8px; gap: 6px;
            flex-shrink: 0; min-width: 0;
            border-bottom: 1px solid #134e4a;
        }
        .artifact-title { flex: 1; font-size: 12px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .artifact-tabs { display: flex; gap: 2px; flex-shrink: 0; }
        .artifact-tab { background: none; border: none; color: #888; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
        .artifact-tab.active { background: rgba(20,184,166,0.15); color: #14b8a6; }
        .artifact-action-btn { background: none; border: none; color: #888; font-size: 15px; cursor: pointer; padding: 3px 5px; border-radius: 4px; line-height: 1; text-decoration: none; display: inline-flex; align-items: center; flex-shrink: 0; }
        .artifact-action-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .artifact-pane { flex: 1; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; max-width: 100%; }
        .artifact-pane.active { display: block; }
        .artifact-pane iframe { width: 100%; height: 100%; border: none; display: block; }
        .artifact-pane img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; margin: auto; padding: 8px; }
        .artifact-svg-wrap { padding: 12px; overflow: auto; }
        .artifact-svg-wrap svg { max-width: 100%; height: auto; }
        .artifact-pane pre { margin: 0; padding: 12px; font-size: 12px; font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace; line-height: 1.5; color: #cdd6f4; background: #071515; min-height: 100%; white-space: pre-wrap; word-break: break-all; }
        .artifact-md-render { padding: 12px 16px; }
        .artifact-no-preview { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 13px; gap: 8px; padding: 24px; text-align: center; }

        /* ===== LIGHT THEME ===== */
        body.light { background: #f5f0e8; color: #222; }
        body.light header { background: #ede8df; border-bottom-color: #c8d8d5; }
        body.light header h1 { color: #0d9488; }
        body.light #sidebar-toggle { color: #555; }
        body.light #sidebar-toggle:hover { color: #111; background: rgba(0,0,0,0.06); }
        body.light #sidebar { background: #ede8df; border-right-color: #c8d8d5; }
        body.light .sidebar-header { border-bottom-color: #c8d8d5; }
        body.light .sidebar-header h2 { color: #0d9488; }
        body.light .sidebar-tabs { border-bottom-color: #c8d8d5; }
        body.light .sidebar-tab { color: #888; }
        body.light .sidebar-tab.active { color: #0d9488; border-bottom-color: #0d9488; }
        body.light .convo-item:hover { background: rgba(13,148,136,0.08); }
        body.light .convo-item.active { background: rgba(13,148,136,0.15); }
        body.light .convo-title { color: #555; }
        body.light .convo-item.active .convo-title { color: #0d9488; }
        body.light .convo-delete { color: #aaa; }
        body.light .message.user { background: #dde8e6; color: #222; }
        body.light .message.assistant { background: #ede8df; color: #222; border: 1px solid #c8d8d5; }
        body.light .message.reasoning { background: #eef0ff; color: #4338ca; border-left-color: #6366f1; }
        body.light .message.system-action { background: rgba(13,148,136,0.08); color: #0d9488; }
        body.light .message.assistant pre { background: #e5e0d6; }
        body.light .message.assistant p code { background: #e5e0d6; }
        body.light .message.assistant strong { color: #111; }
        body.light .message.assistant blockquote { color: #666; }
        body.light .message.assistant a { color: #0284c7; }
        body.light .message.assistant th { background: #c8d8d5; color: #222; }
        body.light .message.assistant th, body.light .message.assistant td { border-color: #c8d8d5; }
        body.light #chat { background: #f5f0e8; }
        body.light #input-area { background: #ede8df; border-top-color: #c8d8d5; }
        body.light #message-input { background: #f5f0e8; border-color: #c8d8d5; color: #222; }
        body.light #message-input:focus { border-color: #0d9488; }
        body.light #model-info { background: #ede8df; border-bottom-color: #c8d8d5; color: #888; }
        body.light #model-select { background: #f5f0e8; border-color: #c8d8d5; color: #555; }
        body.light #mode-select { background: #f5f0e8; border-color: #c8d8d5; color: #0d9488; }
        body.light #settings-panel { background: #ede8df; border-bottom-color: #c8d8d5; }
        body.light #settings-panel input, body.light #settings-panel textarea { background: #f5f0e8; border-color: #c8d8d5; color: #222; }
        body.light .token-badge { color: #888; }
        body.light .copy-btn { color: #888; }
        body.light .copy-btn:hover { background: rgba(0,0,0,0.06); color: #444; }
        body.light .copy-btn.copied { color: #0d9488; }
        body.light .edit-btn { color: #0d9488; }
        body.light .regen-btn { color: #0d9488; }
        body.light .header-btn { color: #555; }
        body.light .header-btn:hover { color: #111; }
        body.light #mute-toggle.muted { color: #be123c; }
        body.light #sidebar-overlay { background: rgba(0,0,0,0.3); }
        body.light .memory-item { background: rgba(13,148,136,0.04); border-color: rgba(13,148,136,0.1); }
        body.light .memory-name { color: #444; }
        body.light .memory-content { color: #666; }
        body.light #upload-btn { background: #dde8e6; color: #555; }
        body.light #upload-btn:hover { background: #c8d8d5; color: #222; }
        body.light .file-preview { background: #dde8e6; color: #222; }
        body.light .artifact-card { background: #dde8e6; border-color: #b8d4d0; }
        body.light .artifact-card:hover { background: #c8d8d5; }
        body.light .artifact-card-name { color: #222; }
        body.light #artifact-sheet { background: #ede8df; border-top-color: #0d9488; }
        body.light .artifact-tab.active { background: rgba(13,148,136,0.12); color: #0d9488; }
        body.light .artifact-pane pre { background: #e5e0d6; color: #222; }
        body.light .artifact-handle-bar::after { background: #c8d8d5; }
        body.light .artifact-header { border-bottom-color: #c8d8d5; }
        body.light .process-log .step-text { color: #666; }
        body.light .message.fetch-context { background: rgba(2,132,199,0.06); color: #0369a1; }
        body.light .fetch-context-header { color: #0284c7; }
        body.light .sidebar-actions { border-bottom-color: #c8d8d5; }
        body.light .sidebar-actions button { background: rgba(13,148,136,0.06); border-color: #c8d8d5; color: #777; }
        body.light .sidebar-actions button:hover { background: rgba(13,148,136,0.12); color: #333; border-color: #0d9488; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            header h1 { font-size: 14px; }
            #model-select { max-width: 120px; font-size: 10px; }
            #mode-select { max-width: 80px; font-size: 10px; }
            .message { max-width: 92%; }
            #sidebar { width: 260px; }
        }
    </style>
</head>
<body>
    <div id="sidebar-overlay"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Nemo</h2>
            <button id="new-convo-btn">+ New</button>
        </div>
        <div class="sidebar-actions">
            <button id="clear-btn" title="Clear conversation">&#128465; Clear</button>
            <button id="fetch-btn" title="Fetch URL content">&#127760; Fetch URL</button>
        </div>
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="conversations">Chats</button>
            <button class="sidebar-tab" data-tab="memory">Memory</button>
        </div>
        <div class="sidebar-content" id="convo-list"></div>
        <div class="sidebar-content" id="memory-list" style="display:none"></div>
    </div>

    <header>
        <button id="sidebar-toggle" title="Conversations">&#9776;</button>
        <h1>Nemo Harness</h1>
        <select id="mode-select" title="Behavioral mode"></select>
        <select id="model-select" title="Select model"></select>
        <div class="header-spacer"></div>
        <button id="mute-toggle" class="header-btn" title="Mute notification sounds">&#128264;</button>
        <button id="settings-btn" class="header-btn" title="Settings">&#9881;</button>
        <button id="theme-toggle" class="header-btn" title="Toggle theme">&#9788;</button>
        <div class="status-dot" id="status-dot" title="Connecting..."></div>
    </header>

    <div id="settings-panel">
        <label>System Prompt Override (leave empty to use mode default)</label>
        <textarea id="cfg-system-prompt" rows="3"></textarea>
        <div class="settings-row">
            <div>
                <label>Temperature</label>
                <input id="cfg-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div>
                <label>Max Tokens</label>
                <input id="cfg-max-tokens" type="number" min="64" max="8192" step="64" value="2048">
            </div>
        </div>
        <button onclick="saveSettings()">Save</button>
    </div>

    <div id="model-info">Connecting...</div>
    <div id="chat"></div>
    <button id="scroll-bottom-btn" title="Scroll to bottom">&darr;</button>

    <div id="input-area">
        <input type="file" id="file-input" multiple>
        <button id="upload-btn" title="Upload file">&#128206;</button>
        <textarea id="message-input" placeholder="Message Nemotron..." rows="1"></textarea>
        <button id="send-btn" disabled>&#10148;</button>
    </div>
    <div id="file-preview-area"></div>

    <div class="image-modal" id="image-modal">
        <img src="" alt="Fullscreen image">
    </div>

    <!-- Artifact bottom sheet -->
    <div id="artifact-sheet">
        <div class="artifact-handle-bar" id="artifact-drag-handle"></div>
        <div class="artifact-header">
            <span class="artifact-title" id="artifact-title">artifact</span>
            <div class="artifact-tabs">
                <button class="artifact-tab active" id="tab-preview" onclick="switchArtifactTab('preview')">Preview</button>
                <button class="artifact-tab" id="tab-code" onclick="switchArtifactTab('code')">Code</button>
            </div>
            <button class="artifact-action-btn" id="artifact-expand-btn" onclick="toggleArtifactFullscreen()" title="Expand">&#10530;</button>
            <a class="artifact-action-btn" id="artifact-download-btn" title="Download" download>&#11015;</a>
            <button class="artifact-action-btn" onclick="closeArtifactSheet()" title="Close">&#10005;</button>
        </div>
        <div class="artifact-pane active" id="artifact-preview-pane"></div>
        <div class="artifact-pane" id="artifact-code-pane"></div>
    </div>

    <script>
        // ===== CONSTANTS & DOM REFS =====
        const API_BASE = window.location.origin;
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusDot = document.getElementById('status-dot');
        const modelInfo = document.getElementById('model-info');
        const modelSelect = document.getElementById('model-select');
        const modeSelect = document.getElementById('mode-select');
        const scrollBottomBtn = document.getElementById('scroll-bottom-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const newConvoBtn = document.getElementById('new-convo-btn');
        const convoList = document.getElementById('convo-list');
        const memoryList = document.getElementById('memory-list');
        const imageModal = document.getElementById('image-modal');
        const modalImg = imageModal.querySelector('img');
        const muteToggle = document.getElementById('mute-toggle');
        const fetchBtn = document.getElementById('fetch-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const filePreviewArea = document.getElementById('file-preview-area');

        // ===== STATE =====
        let isSending = false;
        let currentModel = '';
        let currentMode = 'default';
        let temperature = 0.7;
        let maxTokens = 2048;
        let turnIndex = 0;
        let pendingEditTurn = null;
        let currentConvoId = null;
        let isMuted = localStorage.getItem('nemo-muted') === 'true';
        let currentEventSource = null;
        let pendingFiles = [];

        if (!sessionStorage.getItem('nemo-session-id')) {
            sessionStorage.setItem('nemo-session-id', crypto.randomUUID());
        }
        const SESSION_ID = sessionStorage.getItem('nemo-session-id');

        marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // ===== MUTE =====
        function applyMute() {
            muteToggle.classList.toggle('muted', isMuted);
            muteToggle.innerHTML = isMuted ? '&#128263;' : '&#128264;';
            localStorage.setItem('nemo-muted', isMuted);
        }
        muteToggle.addEventListener('click', () => { isMuted = !isMuted; applyMute(); });
        applyMute();

        // ===== THEME =====
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
            themeToggle.textContent = theme === 'light' ? '\u263D' : '\u263C';
            localStorage.setItem('nemo-theme', theme);
        }
        themeToggle.addEventListener('click', () => {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });
        applyTheme(localStorage.getItem('nemo-theme') || 'dark');

        // ===== SIDEBAR =====
        function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('active'); }
        function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active'); }
        sidebarToggle.addEventListener('click', () => { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); });
        sidebarOverlay.addEventListener('click', closeSidebar);

        document.querySelectorAll('.sidebar-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                convoList.style.display = target === 'conversations' ? '' : 'none';
                memoryList.style.display = target === 'memory' ? '' : 'none';
                if (target === 'memory') loadMemory();
            });
        });

        // ===== MODE SELECTOR =====
        async function loadModes() {
            try {
                const res = await fetch(`${API_BASE}/api/modes`);
                const modes = await res.json();
                modeSelect.innerHTML = '';
                for (const [key, val] of Object.entries(modes)) {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = val.name;
                    if (val.active) { opt.selected = true; currentMode = key; }
                    modeSelect.appendChild(opt);
                }
            } catch (e) {
                modeSelect.innerHTML = '<option value="default">Default</option>';
            }
        }

        modeSelect.addEventListener('change', async () => {
            try {
                const res = await fetch(`${API_BASE}/api/modes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: modeSelect.value })
                });
                const data = await res.json();
                if (data.status === 'switched') {
                    currentMode = modeSelect.value;
                    if (data.model) {
                        currentModel = data.model;
                        const modelOpt = Array.from(modelSelect.options).find(o => o.value === data.model);
                        if (modelOpt) modelOpt.selected = true;
                    }
                    addMessage(`Mode switched to: ${data.name}`, 'system-action');
                }
            } catch (e) {}
        });

        // ===== MEMORY PANEL =====
        async function loadMemory() {
            try {
                const res = await fetch(`${API_BASE}/api/memory`);
                const entries = await res.json();
                memoryList.innerHTML = '';
                for (const e of entries) {
                    const item = document.createElement('div');
                    item.className = 'memory-item';
                    item.innerHTML = `
                        <div class="memory-item-header">
                            <span class="memory-type ${e.type}">${e.type}</span>
                            <span class="memory-name">${escapeHtml(e.name)}</span>
                            <button class="memory-delete" data-id="${e.id}" title="Delete">&times;</button>
                        </div>
                        <div class="memory-content">${escapeHtml(e.content.substring(0, 200))}</div>
                    `;
                    item.querySelector('.memory-delete').addEventListener('click', async () => {
                        await fetch(`${API_BASE}/api/memory/${e.id}`, { method: 'DELETE' });
                        loadMemory();
                    });
                    memoryList.appendChild(item);
                }
                const addBtn = document.createElement('button');
                addBtn.id = 'memory-add-btn';
                addBtn.textContent = '+ Add Memory';
                addBtn.addEventListener('click', promptAddMemory);
                memoryList.appendChild(addBtn);
            } catch (e) {
                memoryList.innerHTML = '<div style="padding:12px;color:#888;font-size:12px">Failed to load memory</div>';
            }
        }

        function promptAddMemory() {
            const type = prompt('Type (user, feedback, project, reference):');
            if (!type) return;
            const name = prompt('Name:');
            if (!name) return;
            const content = prompt('Content:');
            if (!content) return;
            fetch(`${API_BASE}/api/memory`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, name, content })
            }).then(() => loadMemory()).catch(() => {});
        }

        // ===== CONVERSATION MANAGEMENT =====
        function getConversations() {
            try { return JSON.parse(localStorage.getItem('nemo-conversations') || '[]'); }
            catch { return []; }
        }
        function saveConversations(convos) { localStorage.setItem('nemo-conversations', JSON.stringify(convos)); }
        function generateConvoId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
        function getConvoTitle(messages) {
            const firstUser = messages.find(m => m.role === 'user');
            if (!firstUser) return 'New conversation';
            return firstUser.content.slice(0, 50) + (firstUser.content.length > 50 ? '...' : '');
        }

        function getCurrentMessages() {
            const messages = [];
            chat.querySelectorAll('.message').forEach(el => {
                if (el.classList.contains('user')) {
                    messages.push({ role: 'user', content: el.dataset.raw || el.textContent });
                } else if (el.classList.contains('assistant') && !el.classList.contains('typing')) {
                    messages.push({ role: 'assistant', content: el.dataset.raw || '' });
                } else if (el.classList.contains('reasoning')) {
                    messages.push({ role: 'reasoning', content: el.textContent });
                }
            });
            return messages;
        }

        function autoSaveConversation() {
            const messages = getCurrentMessages();
            if (messages.length === 0) return;
            const convos = getConversations();
            const now = new Date().toISOString();
            if (currentConvoId) {
                const idx = convos.findIndex(c => c.id === currentConvoId);
                if (idx >= 0) {
                    convos[idx].messages = messages;
                    convos[idx].updated = now;
                    convos[idx].title = getConvoTitle(messages);
                }
            } else {
                currentConvoId = generateConvoId();
                convos.unshift({ id: currentConvoId, title: getConvoTitle(messages), messages, created: now, updated: now });
            }
            saveConversations(convos);
            renderConvoList();
            fetch(`${API_BASE}/api/conversations`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentConvoId, title: getConvoTitle(messages), messages }),
            }).catch(() => {});
        }

        function renderConvoList() {
            const convos = getConversations();
            convoList.innerHTML = '';
            for (const c of convos) {
                const item = document.createElement('div');
                item.className = 'convo-item' + (c.id === currentConvoId ? ' active' : '');
                const dateStr = new Date(c.updated || c.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                item.innerHTML = `
                    <span class="convo-title">${escapeHtml(c.title)}</span>
                    <span class="convo-date">${dateStr}</span>
                    <button class="convo-delete" title="Delete">&times;</button>
                `;
                item.querySelector('.convo-title').addEventListener('click', () => loadConversation(c.id));
                item.querySelector('.convo-delete').addEventListener('click', (e) => { e.stopPropagation(); deleteConversation(c.id); });
                convoList.appendChild(item);
            }
        }

        function loadConversation(id) {
            const convos = getConversations();
            const convo = convos.find(c => c.id === id);
            if (!convo) return;
            currentConvoId = id;
            chat.innerHTML = '';
            turnIndex = 0;
            fetch(`${API_BASE}/api/clear`, { method: 'POST' }).catch(() => {});
            for (const msg of convo.messages) {
                addMessage(msg.content, msg.role === 'reasoning' ? 'reasoning' : msg.role);
            }
            const chatMessages = convo.messages.filter(m => m.role === 'user' || m.role === 'assistant');
            fetch(`${API_BASE}/api/history/restore`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatMessages }),
            }).catch(() => {});
            renderConvoList();
            closeSidebar();
        }

        function deleteConversation(id) {
            let convos = getConversations();
            convos = convos.filter(c => c.id !== id);
            saveConversations(convos);
            if (id === currentConvoId) {
                currentConvoId = null; chat.innerHTML = ''; turnIndex = 0;
                fetch(`${API_BASE}/api/clear`, { method: 'POST' }).catch(() => {});
            }
            fetch(`${API_BASE}/api/conversations/${id}`, { method: 'DELETE' }).catch(() => {});
            renderConvoList();
        }

        function startNewConversation() {
            autoSaveConversation();
            currentConvoId = null; chat.innerHTML = ''; turnIndex = 0;
            fetch(`${API_BASE}/api/clear`, { method: 'POST' }).catch(() => {});
            renderConvoList(); closeSidebar(); input.focus();
        }
        newConvoBtn.addEventListener('click', startNewConversation);

        // ===== SETTINGS =====
        settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
        function saveSettings() {
            const sysprompt = document.getElementById('cfg-system-prompt').value;
            temperature = parseFloat(document.getElementById('cfg-temperature').value) || 0.7;
            maxTokens = parseInt(document.getElementById('cfg-max-tokens').value) || 2048;
            fetch(`${API_BASE}/api/config`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ system_prompt: sysprompt || null })
            }).then(() => settingsPanel.classList.remove('open'));
        }

        // ===== FILE UPLOAD =====
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
            fileInput.value = '';
        });

        input.addEventListener('paste', (e) => {
            const items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            const imageFiles = [];
            for (const item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    if (file) {
                        const ext = item.type.split('/')[1] || 'png';
                        const named = new File([file], `paste-${Date.now()}.${ext}`, { type: item.type });
                        imageFiles.push(named);
                    }
                }
            }
            if (imageFiles.length > 0) {
                e.preventDefault();
                addFiles(imageFiles);
            }
        });

        chat.addEventListener('dragover', (e) => { e.preventDefault(); chat.classList.add('drop-zone'); });
        chat.addEventListener('dragleave', () => { chat.classList.remove('drop-zone'); });
        chat.addEventListener('drop', (e) => {
            e.preventDefault();
            chat.classList.remove('drop-zone');
            addFiles(Array.from(e.dataTransfer.files));
        });

        function addFiles(files) {
            for (const file of files) {
                if (file.size > 20 * 1024 * 1024) { alert(`File too large: ${file.name} (max 20MB)`); continue; }
                pendingFiles.push(file);
            }
            updateFilePreview();
            updateSendButton();
        }

        function updateFilePreview() {
            filePreviewArea.innerHTML = '';
            for (let i = 0; i < pendingFiles.length; i++) {
                const file = pendingFiles[i];
                const size = file.size < 1024 ? `${file.size}B` :
                             file.size < 1024*1024 ? `${(file.size/1024).toFixed(1)}KB` :
                             `${(file.size/1024/1024).toFixed(1)}MB`;
                const div = document.createElement('div');
                div.className = 'file-preview';
                div.innerHTML = `<span class="name">${file.name}</span><span class="size">${size}</span><span class="remove" data-index="${i}">&times;</span>`;
                filePreviewArea.appendChild(div);
            }
            filePreviewArea.querySelectorAll('.remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    pendingFiles.splice(parseInt(e.target.dataset.index), 1);
                    updateFilePreview();
                    updateSendButton();
                });
            });
        }

        async function uploadFiles() {
            const uploaded = [];
            for (const file of pendingFiles) {
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
                    if (res.ok) uploaded.push(await res.json());
                } catch (e) { console.error('Upload failed:', e); }
            }
            pendingFiles = [];
            updateFilePreview();
            return uploaded;
        }

        // ===== IMAGE MODAL =====
        imageModal.addEventListener('click', () => imageModal.classList.remove('active'));
        function openImageModal(src) { modalImg.src = src; imageModal.classList.add('active'); }

        // ===== SCROLL BUTTON =====
        function updateScrollButton() {
            const isNearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 100;
            scrollBottomBtn.classList.toggle('visible', !isNearBottom);
        }
        chat.addEventListener('scroll', updateScrollButton);
        scrollBottomBtn.addEventListener('click', () => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }));

        // ===== INPUT =====
        function updateSendButton() {
            sendBtn.disabled = (!input.value.trim() && pendingFiles.length === 0);
        }
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            updateSendButton();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled && !isSending) sendMessage();
            }
        });
        sendBtn.addEventListener('click', () => { if (!isSending) sendMessage(); });
        clearBtn.addEventListener('click', () => {
            if (!confirm('Clear conversation?')) return;
            fetch(`${API_BASE}/api/clear`, { method: 'POST' });
            chat.innerHTML = ''; turnIndex = 0; currentConvoId = null; renderConvoList();
        });

        // ===== FETCH URL =====
        async function fetchUrl(url) {
            fetchBtn.classList.add('fetching');
            const statusMsg = addMessage(`Fetching: ${url}...`, 'system-action');
            try {
                const res = await fetch(`${API_BASE}/api/fetch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                statusMsg.remove();
                if (!res.ok) {
                    addMessage(`Fetch failed: ${data.error || 'Unknown error'}`, 'system-action');
                    return;
                }
                const msg = document.createElement('div');
                msg.className = 'message fetch-context';
                const preview = data.content.length > 2000 ? data.content.substring(0, 2000) + '...' : data.content;
                msg.innerHTML = `<div class="fetch-context-header">Fetched: ${escapeHtml(data.url)}</div>`
                    + `<div class="fetch-context-body">${escapeHtml(preview)}</div>`
                    + `<div class="fetch-context-meta">${escapeHtml(data.content_type)} | ${data.content.length.toLocaleString()} chars${data.truncated ? ' (truncated)' : ''}</div>`;
                chat.appendChild(msg);
                chat.scrollTop = chat.scrollHeight;
                const contextText = `[Fetched content from ${data.url}]\n\n${data.content}`;
                await fetch(`${API_BASE}/api/history/restore`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [...getCurrentMessages().filter(m => m.role === 'user' || m.role === 'assistant'),
                                   { role: 'user', content: contextText }]
                    })
                });
                addMessage(contextText, 'user');
                autoSaveConversation();
            } catch (e) {
                statusMsg.remove();
                addMessage(`Fetch error: ${e.message}`, 'system-action');
            } finally {
                fetchBtn.classList.remove('fetching');
            }
        }

        fetchBtn.addEventListener('click', () => {
            const url = prompt('Enter URL to fetch:');
            if (url && url.trim()) fetchUrl(url.trim());
        });

        // ===== UTILITIES =====
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        const ARTIFACT_ICONS = { svg: '\uD83D\uDD37', html: '\uD83C\uDF10', htm: '\uD83C\uDF10', pdf: '\uD83D\uDCC4', md: '\uD83D\uDCDD', txt: '\uD83D\uDCDD', json: '\uD83D\uDCCB', py: '\uD83D\uDC0D', js: '\uD83D\uDCDC', css: '\uD83C\uDFA8', docx: '\uD83D\uDCC4', xlsx: '\uD83D\uDCCA', pptx: '\uD83D\uDCCA' };
        function artifactIcon(ext) { return ARTIFACT_ICONS[ext] || '\uD83D\uDCC1'; }

        // ===== ADD MESSAGE =====
        function addMessage(content, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            if (role === 'user') {
                const thisTurn = turnIndex++;
                msg.dataset.turn = thisTurn;
                msg.dataset.raw = content;
                msg.textContent = content;
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.textContent = 'Edit';
                editBtn.addEventListener('click', () => startEdit(thisTurn, content));
                msg.appendChild(editBtn);

            } else if (role === 'assistant') {
                msg.dataset.raw = content;

                // Process artifact references in content
                const artifactPattern = /\[artifact:([^\]|]+)(?:\|([^\]]+))?\]/g;
                let cleanContent = content;
                const artifacts = [];
                let match;
                while ((match = artifactPattern.exec(content)) !== null) {
                    const path = match[1].trim();
                    const name = (match[2] || path.split('/').pop()).trim();
                    artifacts.push({ path, name });
                }
                cleanContent = cleanContent.replace(artifactPattern, '');

                msg.innerHTML = marked.parse(cleanContent);
                renderMathInElement(msg, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\[', right: '\\]', display: true },
                        { left: '\\(', right: '\\)', display: false }
                    ],
                    throwOnError: false
                });
                msg.querySelectorAll('table').forEach(table => {
                    const wrap = document.createElement('div');
                    wrap.className = 'table-wrap';
                    table.parentNode.insertBefore(wrap, table);
                    wrap.appendChild(table);
                });
                msg.querySelectorAll('img').forEach(img => {
                    img.addEventListener('click', () => openImageModal(img.src));
                });

                // Render artifact cards
                artifacts.forEach(({ path, name }) => {
                    const ext = name.split('.').pop().toLowerCase();
                    const apiUrl = `${API_BASE}/api/files/output/${encodeURIComponent(name)}`;
                    const card = document.createElement('div');
                    card.className = 'artifact-card';
                    card.innerHTML = `
                        <span class="artifact-card-icon">${artifactIcon(ext)}</span>
                        <div class="artifact-card-info">
                            <div class="artifact-card-name">${escapeHtml(name)}</div>
                            <div class="artifact-card-type">${ext.toUpperCase()}</div>
                        </div>
                        <span class="artifact-card-view">View</span>`;
                    card.addEventListener('click', () => openArtifact(apiUrl, name));
                    msg.appendChild(card);
                });

                addAssistantControls(msg, content);

            } else if (role === 'reasoning') {
                msg.textContent = content;
            } else if (role === 'system-action') {
                msg.textContent = content;
            }

            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        function addAssistantControls(msg, content) {
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.title = 'Copy';
            copyBtn.textContent = '\u2398';
            copyBtn._rawContent = content;
            copyBtn.addEventListener('click', () => {
                function onCopied() {
                    copyBtn.textContent = '\u2713'; copyBtn.classList.add('copied');
                    setTimeout(() => { copyBtn.textContent = '\u2398'; copyBtn.classList.remove('copied'); }, 1500);
                }
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(copyBtn._rawContent).then(onCopied);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = copyBtn._rawContent;
                    ta.style.cssText = 'position:fixed;left:-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    onCopied();
                }
            });
            msg.appendChild(copyBtn);

            const evalWrap = document.createElement('span');
            evalWrap.className = 'eval-btns';
            [['👍', 1], ['👎', -1]].forEach(([icon, score]) => {
                const eb = document.createElement('button');
                eb.className = 'eval-btn';
                eb.title = score === 1 ? 'Good response' : 'Poor response';
                eb.textContent = icon;
                eb.addEventListener('click', async () => {
                    if (evalWrap.dataset.scored) return;
                    evalWrap.dataset.scored = '1';
                    evalWrap.querySelectorAll('.eval-btn').forEach(b => b.disabled = true);
                    eb.classList.add('eval-selected');
                    await fetch(`${API_BASE}/api/evaluate`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ score, session_id: SESSION_ID, message_preview: content.slice(0, 200) })
                    }).catch(() => {});
                });
                evalWrap.appendChild(eb);
            });
            msg.appendChild(evalWrap);

            const regenBtn = document.createElement('button');
            regenBtn.className = 'regen-btn';
            regenBtn.textContent = 'Regenerate';
            regenBtn.addEventListener('click', () => regenerateLastResponse());
            msg.appendChild(regenBtn);
        }

        // ===== EDIT =====
        function startEdit(turn, rawContent) {
            if (isSending) return;
            const msgEl = chat.querySelector(`.message.user[data-turn="${turn}"]`);
            if (!msgEl) return;
            let el = msgEl;
            while (el) { const next = el.nextSibling; chat.removeChild(el); el = next; }
            turnIndex = turn;
            pendingEditTurn = turn;
            input.value = rawContent;
            input.dispatchEvent(new Event('input'));
            input.focus();
            autoSaveConversation();
        }

        // ===== REGENERATE =====
        function regenerateLastResponse() {
            if (isSending) return;
            const assistantMsgs = chat.querySelectorAll('.message.assistant:not(.typing)');
            if (assistantMsgs.length === 0) return;
            const lastAssistant = assistantMsgs[assistantMsgs.length - 1];
            let prevEl = lastAssistant.previousElementSibling;
            if (prevEl && prevEl.classList.contains('reasoning')) prevEl.remove();
            const allMsgs = Array.from(chat.querySelectorAll('.message'));
            const assistantIdx = allMsgs.indexOf(lastAssistant);
            let userMsg = null;
            for (let i = assistantIdx - 1; i >= 0; i--) {
                if (allMsgs[i].classList.contains('user')) { userMsg = allMsgs[i]; break; }
            }
            if (!userMsg) return;
            const userText = userMsg.dataset.raw || userMsg.textContent;
            lastAssistant.remove();
            doSendMessage(userText, true);
        }

        // ===== STATUS =====
        function setStatus(text, type) {
            statusDot.className = 'status-dot ' + type;
            statusDot.title = text;
        }

        // ===== ARTIFACT BOTTOM SHEET =====
        const artifactSheet = document.getElementById('artifact-sheet');
        const artifactDragHandle = document.getElementById('artifact-drag-handle');
        let artifactIsFullscreen = false;
        let artifactDragState = null;

        function openArtifact(apiUrl, filename) {
            const ext = filename.split('.').pop().toLowerCase();

            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                if (ext === 'md') {
                    fetch(apiUrl).then(r => r.text()).then(md => {
                        const html = `<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:system-ui,sans-serif;padding:16px;max-width:800px;margin:0 auto;line-height:1.6;color:#222}pre{overflow-x:auto;background:#f0f0f0;padding:12px;border-radius:4px}code{background:#f0f0f0;padding:2px 4px;border-radius:2px}img{max-width:100%;height:auto}</style></head><body>${marked.parse(md)}</body></html>`;
                        const blob = new Blob([html], {type: 'text/html'});
                        window.location.href = URL.createObjectURL(blob);
                    });
                } else {
                    window.location.href = apiUrl;
                }
                return;
            }

            const previewPane = document.getElementById('artifact-preview-pane');
            const codePane = document.getElementById('artifact-code-pane');
            const titleEl = document.getElementById('artifact-title');
            const tabCode = document.getElementById('tab-code');
            const dlBtn = document.getElementById('artifact-download-btn');

            titleEl.textContent = filename;
            dlBtn.href = apiUrl;
            dlBtn.download = filename;
            previewPane.innerHTML = '<div class="artifact-no-preview">Loading...</div>';
            codePane.innerHTML = '';

            const textTypes = ['svg', 'html', 'htm', 'md', 'txt', 'json', 'py', 'js', 'ts', 'css', 'sh', 'yaml', 'yml'];
            const hasCode = textTypes.includes(ext);
            tabCode.style.display = hasCode ? '' : 'none';

            switchArtifactTab('preview');
            artifactSheet.style.height = '50vh';
            artifactSheet.classList.remove('fullscreen');
            artifactIsFullscreen = false;
            document.getElementById('artifact-expand-btn').textContent = '\u2922';
            artifactSheet.classList.add('open');

            fetch(apiUrl).then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.text();
            }).then(text => {
                previewPane.innerHTML = '';
                if (['png','jpg','jpeg','gif','webp'].includes(ext)) {
                    const img = document.createElement('img');
                    img.src = apiUrl;
                    previewPane.appendChild(img);
                } else if (ext === 'svg') {
                    const sanitized = text.replace(/<script[\s\S]*?<\/script>/gi, '').replace(/\son\w+="[^"]*"/gi, '');
                    const wrap = document.createElement('div');
                    wrap.className = 'artifact-svg-wrap';
                    wrap.innerHTML = sanitized;
                    previewPane.appendChild(wrap);
                } else if (['html','htm'].includes(ext)) {
                    const iframe = document.createElement('iframe');
                    iframe.sandbox = 'allow-scripts';
                    previewPane.appendChild(iframe);
                    iframe.srcdoc = text;
                } else if (ext === 'pdf') {
                    const iframe = document.createElement('iframe');
                    iframe.src = apiUrl;
                    previewPane.appendChild(iframe);
                } else if (ext === 'md') {
                    const div = document.createElement('div');
                    div.className = 'artifact-md-render message assistant';
                    div.style.cssText = 'border-radius:0;max-width:100%;background:transparent;padding:12px 16px;';
                    div.innerHTML = marked.parse(text);
                    previewPane.appendChild(div);
                } else {
                    const pre = document.createElement('pre');
                    pre.textContent = text;
                    previewPane.appendChild(pre);
                }
                if (hasCode) {
                    const pre = document.createElement('pre');
                    pre.textContent = text;
                    codePane.appendChild(pre);
                }
            }).catch(err => {
                previewPane.innerHTML = `<div class="artifact-no-preview">Could not load artifact<br><small>${err.message}</small></div>`;
            });
        }

        function closeArtifactSheet() {
            artifactSheet.classList.remove('open');
            artifactIsFullscreen = false;
            artifactSheet.classList.remove('fullscreen');
        }

        function toggleArtifactFullscreen() {
            if (artifactIsFullscreen) {
                artifactSheet.style.height = '50vh';
                artifactSheet.classList.remove('fullscreen');
                artifactIsFullscreen = false;
                document.getElementById('artifact-expand-btn').textContent = '\u2922';
            } else {
                artifactSheet.style.height = 'calc(100vh - env(safe-area-inset-top, 44px))';
                artifactSheet.classList.add('fullscreen');
                artifactIsFullscreen = true;
                document.getElementById('artifact-expand-btn').textContent = '\u2921';
            }
        }

        function switchArtifactTab(tab) {
            document.getElementById('artifact-preview-pane').classList.toggle('active', tab === 'preview');
            document.getElementById('artifact-code-pane').classList.toggle('active', tab === 'code');
            document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
            document.getElementById('tab-code').classList.toggle('active', tab === 'code');
        }

        // Drag to resize
        function onArtifactDragStart(clientY) {
            artifactDragState = { startY: clientY, startHeight: artifactSheet.offsetHeight };
            artifactSheet.style.transition = 'none';
        }
        function onArtifactDragMove(clientY) {
            if (!artifactDragState) return;
            const delta = artifactDragState.startY - clientY;
            const h = Math.max(60, Math.min(window.innerHeight, artifactDragState.startHeight + delta));
            artifactSheet.style.height = h + 'px';
        }
        function onArtifactDragEnd() {
            if (!artifactDragState) return;
            artifactSheet.style.transition = '';
            const h = artifactSheet.offsetHeight;
            const vh = window.innerHeight;
            if (h < vh * 0.2) { closeArtifactSheet(); }
            else if (h < vh * 0.75) {
                artifactSheet.style.height = '50vh';
                artifactIsFullscreen = false;
                artifactSheet.classList.remove('fullscreen');
            } else {
                artifactSheet.style.height = 'calc(100vh - env(safe-area-inset-top, 44px))';
                artifactIsFullscreen = true;
                artifactSheet.classList.add('fullscreen');
                document.getElementById('artifact-expand-btn').textContent = '\u2921';
            }
            artifactDragState = null;
        }

        artifactDragHandle.addEventListener('touchstart', e => { e.preventDefault(); onArtifactDragStart(e.touches[0].clientY); }, { passive: false });
        document.addEventListener('touchmove', e => { if (artifactDragState) { e.preventDefault(); onArtifactDragMove(e.touches[0].clientY); } }, { passive: false });
        document.addEventListener('touchend', () => onArtifactDragEnd());
        artifactDragHandle.addEventListener('mousedown', e => { onArtifactDragStart(e.clientY); e.preventDefault(); });
        document.addEventListener('mousemove', e => { if (artifactDragState) onArtifactDragMove(e.clientY); });
        document.addEventListener('mouseup', () => onArtifactDragEnd());

        // ===== SEND MESSAGE (Two-Phase Job Queue with Process Log) =====
        async function sendMessage() {
            const text = input.value.trim();
            const hasFiles = pendingFiles.length > 0;
            if (!text && !hasFiles) return;
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Handle /fetch command
            const fetchMatch = text.match(/^\/fetch\s+(\S+)/);
            if (fetchMatch) {
                await fetchUrl(fetchMatch[1]);
                updateSendButton();
                return;
            }

            // Upload files first
            let uploadedFiles = [];
            if (hasFiles) {
                uploadedFiles = await uploadFiles();
            }

            let messageText = text;
            if (uploadedFiles.length > 0) {
                const filePaths = uploadedFiles.map(f => f.path || f.filename).join(', ');
                messageText = `[Uploaded files: ${filePaths}]\n${text}`;
            }

            if (text) addMessage(text, 'user');
            pendingEditTurn = null;
            await doSendMessage(messageText, false);
        }

        async function doSendMessage(text, isRegenerate) {
            isSending = true;
            sendBtn.disabled = true;

            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }

            // Create process log (ThinxS-style animated steps)
            const logMsg = document.createElement('div');
            logMsg.className = 'message assistant';
            const logContainer = document.createElement('div');
            logContainer.className = 'process-log';
            logMsg.appendChild(logContainer);
            chat.appendChild(logMsg);
            chat.scrollTop = chat.scrollHeight;

            let currentStep = null;
            let responseMsg = null;
            let reasoningMsg = null;
            let responseChunks = [];
            let reasoningChunks = [];

            function addStep(icon, text, cls) {
                if (currentStep) {
                    currentStep.classList.remove('active');
                    currentStep.classList.add('done');
                    const prevIcon = currentStep.querySelector('.step-icon');
                    if (prevIcon && prevIcon.classList.contains('spin')) {
                        prevIcon.classList.remove('spin');
                        prevIcon.textContent = '\u2713';
                    }
                }
                const step = document.createElement('div');
                step.className = 'step active' + (cls ? ' ' + cls : '');
                step.innerHTML = '<span class="step-icon' + (cls !== 'tool-done' && cls !== 'error' ? ' spin' : '') + '">' + icon + '</span><span class="step-text">' + text + '</span>';
                logContainer.appendChild(step);
                currentStep = step;
                chat.scrollTop = chat.scrollHeight;
                return step;
            }

            addStep('\u25E6', 'Thinking...', '');

            try {
                const payload = {
                    message: text,
                    model: modelSelect.value || currentModel,
                    temperature,
                    max_tokens: maxTokens,
                };
                if (isRegenerate) payload.regenerate = true;

                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: 'Unknown error' }));
                    logMsg.remove();
                    addMessage('Error: ' + (err.error || `HTTP ${res.status}`), 'assistant');
                    isSending = false;
                    updateSendButton();
                    return;
                }

                const { job_id } = await res.json();

                await new Promise((resolve) => {
                    function connectSSE(fromId) {
                        const url = `${API_BASE}/api/stream/${job_id}`;
                        const es = new EventSource(url);
                        currentEventSource = es;

                        es.onmessage = (event) => {
                            try {
                                const data = JSON.parse(event.data);

                                if (data.type === 'status') {
                                    addStep('\u25E6', data.message, '');
                                } else if (data.type === 'reasoning') {
                                    reasoningChunks.push(data.content);
                                    if (!reasoningMsg) {
                                        // Mark thinking step as done
                                        if (currentStep) {
                                            currentStep.classList.remove('active');
                                            currentStep.classList.add('done');
                                            const prevIcon = currentStep.querySelector('.step-icon');
                                            if (prevIcon) { prevIcon.classList.remove('spin'); prevIcon.textContent = '\u2713'; }
                                            currentStep = null;
                                        }
                                        reasoningMsg = document.createElement('div');
                                        reasoningMsg.className = 'message reasoning';
                                        chat.appendChild(reasoningMsg);
                                    }
                                    reasoningMsg.textContent = reasoningChunks.join('');
                                    chat.scrollTop = chat.scrollHeight;
                                } else if (data.type === 'content') {
                                    if (logMsg.parentNode && !responseMsg) logMsg.remove();
                                    responseChunks.push(data.content);
                                    if (!responseMsg) {
                                        responseMsg = document.createElement('div');
                                        responseMsg.className = 'message assistant';
                                        chat.appendChild(responseMsg);
                                    }
                                    responseMsg.innerHTML = marked.parse(responseChunks.join(''));
                                    chat.scrollTop = chat.scrollHeight;
                                } else if (data.type === 'usage') {
                                    if (responseMsg) {
                                        const badge = document.createElement('div');
                                        badge.className = 'token-badge';
                                        badge.textContent = `\u26A1 ${(data.prompt_tokens || 0).toLocaleString()} in / ${(data.completion_tokens || 0).toLocaleString()} out`;
                                        responseMsg.appendChild(badge);
                                    }
                                } else if (data.type === 'tool_call') {
                                    // Show in process log
                                    const argsStr = JSON.stringify(data.args, null, 2);
                                    const preview = argsStr.length > 100 ? argsStr.slice(0, 100) + '...' : argsStr;
                                    addStep('\u2699', `${data.name}(${preview})`, 'tool');
                                    // If we had a partial response, finalize it
                                    if (responseMsg) {
                                        const fullContent = responseChunks.join('');
                                        responseMsg.dataset.raw = fullContent;
                                        addAssistantControls(responseMsg, fullContent);
                                    }
                                    responseChunks = [];
                                    responseMsg = null;
                                    reasoningChunks = [];
                                    reasoningMsg = null;
                                } else if (data.type === 'tool_result') {
                                    if (currentStep) {
                                        currentStep.classList.remove('active');
