                                        currentStep.classList.add('done', 'tool-done');
                                        const prevIcon = currentStep.querySelector('.step-icon');
                                        if (prevIcon) { prevIcon.classList.remove('spin'); prevIcon.textContent = '\u2713'; }
                                    }
                                    const success = data.result && data.result.success;
                                    const doneStep = document.createElement('div');
                                    doneStep.className = 'step tool-done';
                                    doneStep.innerHTML = `<span class="step-icon">\u2713</span><span class="step-text">${escapeHtml(data.name)}: ${success ? 'OK' : 'FAILED'}</span>`;
                                    logContainer.appendChild(doneStep);
                                    currentStep = null;

                                    // Auto-detect artifact creation and show card
                                    if (success && data.result && data.result.path) {
                                        const artifactName = data.result.path.split('/').pop();
                                        const ext = artifactName.split('.').pop().toLowerCase();
                                        const apiUrl = `${API_BASE}/api/files/output/${encodeURIComponent(artifactName)}`;
                                        const card = document.createElement('div');
                                        card.className = 'artifact-card';
                                        card.innerHTML = `
                                            <span class="artifact-card-icon">${artifactIcon(ext)}</span>
                                            <div class="artifact-card-info">
                                                <div class="artifact-card-name">${escapeHtml(artifactName)}</div>
                                                <div class="artifact-card-type">${ext.toUpperCase()} artifact</div>
                                            </div>
                                            <span class="artifact-card-view">View</span>`;
                                        card.addEventListener('click', () => openArtifact(apiUrl, artifactName));
                                        logContainer.appendChild(card);
                                    }
                                    chat.scrollTop = chat.scrollHeight;
                                } else if (data.type === 'action') {
                                    addStep('\u25C9', data.message, '');
                                } else if (data.type === 'error') {
                                    addStep('\u2717', 'Error: ' + data.message, 'error');
                                    es.close();
                                    resolve();
                                } else if (data.type === 'interrupted') {
                                    if (logMsg.parentNode) logMsg.remove();
                                    es.close();
                                    resolve();
                                } else if (data.type === 'done') {
                                    // Rescue artifact cards before removing the process log
                                    const artifactCards = logContainer.querySelectorAll('.artifact-card');
                                    if (logMsg.parentNode) logMsg.remove();

                                    if (responseMsg) {
                                        const fullContent = responseChunks.join('');
                                        responseMsg.dataset.raw = fullContent;
                                        renderMathInElement(responseMsg, {
                                            delimiters: [
                                                { left: '$$', right: '$$', display: true },
                                                { left: '$', right: '$', display: false },
                                                { left: '\\[', right: '\\]', display: true },
                                                { left: '\\(', right: '\\)', display: false }
                                            ],
                                            throwOnError: false
                                        });
                                        responseMsg.querySelectorAll('table').forEach(table => {
                                            if (table.parentElement.classList.contains('table-wrap')) return;
                                            const wrap = document.createElement('div');
                                            wrap.className = 'table-wrap';
                                            table.parentNode.insertBefore(wrap, table);
                                            wrap.appendChild(table);
                                        });
                                        responseMsg.querySelectorAll('img').forEach(img => {
                                            img.addEventListener('click', () => openImageModal(img.src));
                                        });
                                        addAssistantControls(responseMsg, fullContent);
                                    }
                                    // Append artifact cards after the response message
                                    artifactCards.forEach(card => {
                                        const target = responseMsg || chat;
                                        target.appendChild(card);
                                    });
                                    autoSaveConversation();
                                    es.close();
                                    resolve();
                                }
                            } catch (e) {}
                        };

                        es.onerror = () => {};
                    }

                    connectSSE(null);
                });

            } catch (e) {
                if (logMsg.parentNode) addStep('\u2717', 'Error: ' + e.message, 'error');
            }

            currentEventSource = null;
            isSending = false;
            updateSendButton();
        }

        // ===== API: STATUS =====
        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.status === 'connected') {
                    setStatus('Connected to ' + data.model, 'connected');
                    let infoText = `${data.model} @ ${data.api_base}`;
                    currentModel = data.model;
                    const breakerState = data.circuit_breaker || 'closed';
                    const breakerBadge = `<span class="breaker-badge ${breakerState}">${breakerState}</span>`;
                    modelInfo.innerHTML = `${escapeHtml(infoText)} ${breakerBadge}`;
                } else {
                    setStatus('Disconnected', 'error');
                    modelInfo.textContent = 'Disconnected from inference server';
                }
            } catch (e) {
                setStatus('Offline', 'error');
                modelInfo.textContent = 'Server offline';
            }
        }

        // ===== API: MODELS =====
        const DEFAULT_MODEL = 'nvidia/nemotron-3-nano';

        async function loadModels() {
            try {
                const res = await fetch(`${API_BASE}/api/models`);
                const data = await res.json();
                const models = data.data || [];
                modelSelect.innerHTML = '';
                const preferredModel = currentModel || DEFAULT_MODEL;
                for (const m of models) {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.id;
                    if (m.id === preferredModel) opt.selected = true;
                    modelSelect.appendChild(opt);
                }
                if (!modelSelect.value || modelSelect.value === '--') {
                    const defaultOpt = Array.from(modelSelect.options).find(o => o.value === DEFAULT_MODEL);
                    if (defaultOpt) defaultOpt.selected = true;
                }
            } catch (e) {
                modelSelect.innerHTML = '<option>--</option>';
            }
        }

        // ===== API: HISTORY =====
        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/history`);
                const history = await res.json();
                for (const msg of history) addMessage(msg.content, msg.role);
            } catch (e) {}
        }

        // ===== API: CONFIG =====
        async function loadConfig() {
            try {
                const res = await fetch(`${API_BASE}/api/config`);
                const cfg = await res.json();
                document.getElementById('cfg-system-prompt').value = cfg.custom_system_prompt || '';
            } catch (e) {}
        }

        // ===== INIT =====
        checkStatus();
        loadHistory();
        loadConfig();
        loadModes();
        renderConvoList();
        setTimeout(loadModels, 500);
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
