<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nemo Harness</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #0d2540;
            padding: 8px 12px;
            border-bottom: 1px solid #1a4a3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #76b900;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; flex-shrink: 0; }
        .status-dot.connected { background: #76b900; box-shadow: 0 0 6px #76b900, 0 0 12px rgba(118,185,0,0.4); animation: glow 2s ease-in-out infinite alternate; }
        .status-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
        @keyframes glow { from { box-shadow: 0 0 4px #76b900, 0 0 8px rgba(118,185,0,0.3); } to { box-shadow: 0 0 8px #76b900, 0 0 16px rgba(118,185,0,0.5); } }

        #theme-toggle { background: none; border: none; font-size: 18px; cursor: pointer; color: #aaa; line-height: 1; padding: 4px; flex-shrink: 0; margin-left: auto; }
        #theme-toggle:hover { transform: scale(1.15); color: #fff; }

        #model-select {
            background: #0a1a2e;
            border: 1px solid #1a4a3a;
            color: #aaa;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            max-width: 200px;
        }

        #settings-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #aaa; padding: 4px; flex-shrink: 0; }
        #settings-btn:hover { color: #fff; }

        /* Settings panel */
        #settings-panel {
            display: none;
            background: #0d2540;
            border-bottom: 1px solid #1a4a3a;
            padding: 12px 16px;
            font-size: 12px;
        }
        #settings-panel.open { display: block; }
        #settings-panel label { display: block; color: #aaa; margin-bottom: 4px; margin-top: 8px; }
        #settings-panel label:first-child { margin-top: 0; }
        #settings-panel input, #settings-panel textarea {
            width: 100%;
            background: #0a1a2e;
            border: 1px solid #1a4a3a;
            color: #eee;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }
        #settings-panel textarea { resize: vertical; min-height: 60px; }
        .settings-row { display: flex; gap: 12px; }
        .settings-row > div { flex: 1; }
        #settings-panel button {
            margin-top: 8px;
            background: #76b900;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #model-info {
            font-size: 11px;
            color: #666;
            padding: 2px 12px;
            background: #0d2540;
            border-bottom: 1px solid #1a4a3a;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            position: relative;
        }

        .message.user {
            background: #1a4a3a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #0d2540;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.reasoning {
            background: #1a1a30;
            border-left: 3px solid #6366f1;
            align-self: flex-start;
            font-size: 13px;
            color: #a5b4fc;
            max-width: 90%;
        }

        .message.assistant pre {
            background: #071520;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
            font-size: 13px;
        }

        .message.assistant p code {
            background: #071520;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message.typing {
            color: #888;
            font-style: italic;
        }

        .copy-btn { position: absolute; bottom: 6px; right: 8px; background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; opacity: 0.4; transition: opacity 0.2s; }
        .message:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #aaa; }
        .copy-btn.copied { color: #76b900; }

        /* Markdown */
        .message.assistant h1, .message.assistant h2, .message.assistant h3 { margin: 12px 0 8px 0; font-weight: 600; }
        .message.assistant h1 { font-size: 1.3em; }
        .message.assistant h2 { font-size: 1.15em; }
        .message.assistant h3 { font-size: 1.05em; }
        .message.assistant ul, .message.assistant ol { margin: 8px 0; padding-left: 24px; }
        .message.assistant li { margin: 4px 0; }
        .message.assistant blockquote { border-left: 3px solid #76b900; padding-left: 12px; margin: 8px 0; color: #aaa; }
        .message.assistant a { color: #60a5fa; text-decoration: none; }
        .message.assistant a:hover { text-decoration: underline; }
        .message.assistant strong { color: #fff; }
        .message.assistant hr { border: none; border-top: 1px solid #374151; margin: 12px 0; }
        .message.assistant .table-wrap { overflow-x: auto; margin: 8px 0; }
        .message.assistant table { border-collapse: collapse; width: 100%; }
        .message.assistant th, .message.assistant td { border: 1px solid #374151; padding: 6px 10px; text-align: left; }
        .message.assistant th { background: #374151; }

        .token-badge { font-size: 10px; color: #666; margin-top: 4px; padding: 2px 8px; display: inline-block; }

        #input-area {
            padding: 12px 16px;
            background: #0d2540;
            border-top: 1px solid #1a4a3a;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            min-width: 0;
            background: #0a1a2e;
            border: 1px solid #1a4a3a;
            border-radius: 20px;
            padding: 10px 14px;
            color: #eee;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 40px;
            max-height: 120px;
        }

        #message-input:focus { border-color: #76b900; }

        #send-btn {
            background: #76b900;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            min-width: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:disabled { background: #555; cursor: not-allowed; }
        #send-btn:active:not(:disabled) { transform: scale(0.95); }

        #clear-btn {
            background: none;
            border: 1px solid #333;
            color: #888;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            min-width: 40px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #clear-btn:hover { border-color: #f87171; color: #f87171; }

        /* Light theme */
        body.light { background: #f5f0e8; color: #222; }
        body.light header { background: #ede8df; border-bottom-color: #c8d8d5; }
        body.light header h1 { color: #4a7c10; }
        body.light .message.user { background: #dde8e6; color: #222; }
        body.light .message.assistant { background: #ede8df; color: #222; border: 1px solid #c8d8d5; }
        body.light .message.reasoning { background: #eef0ff; color: #4338ca; border-left-color: #6366f1; }
        body.light .message.assistant pre { background: #e5e0d6; }
        body.light .message.assistant p code { background: #e5e0d6; }
        body.light .message.assistant strong { color: #111; }
        body.light .message.assistant blockquote { color: #666; }
        body.light .message.assistant a { color: #0284c7; }
        body.light .message.assistant th { background: #c8d8d5; color: #222; }
        body.light #chat { background: #f5f0e8; }
        body.light #input-area { background: #ede8df; border-top-color: #c8d8d5; }
        body.light #message-input { background: #f5f0e8; border-color: #c8d8d5; color: #222; }
        body.light #message-input:focus { border-color: #4a7c10; }
        body.light #model-info { background: #ede8df; border-bottom-color: #c8d8d5; color: #888; }
        body.light #model-select { background: #f5f0e8; border-color: #c8d8d5; color: #555; }
        body.light #settings-panel { background: #ede8df; border-bottom-color: #c8d8d5; }
        body.light #settings-panel input, body.light #settings-panel textarea { background: #f5f0e8; border-color: #c8d8d5; color: #222; }
        body.light .token-badge { color: #888; }
        body.light .copy-btn { color: #888; }
        body.light .copy-btn.copied { color: #4a7c10; }

        /* Scroll to bottom */
        #scroll-bottom-btn {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 36px; border-radius: 50%;
            background: #f5f5f0; border: 1px solid #e0e0dc; color: #333;
            font-size: 18px; cursor: pointer; display: none; align-items: center;
            justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 100;
        }
        #scroll-bottom-btn.visible { display: flex; }
        #scroll-bottom-btn:hover { background: #eaeae5; }
    </style>
</head>
<body>
    <header>
        <h1>&#9881; Nemo Harness</h1>
        <select id="model-select" title="Select model"></select>
        <button id="settings-btn" title="Settings">&#9881;</button>
        <button id="theme-toggle" title="Toggle theme">&#9788;</button>
        <div class="status-dot" id="status-dot" title="Connecting..."></div>
    </header>

    <div id="settings-panel">
        <label>System Prompt</label>
        <textarea id="cfg-system-prompt" rows="3"></textarea>
        <div class="settings-row">
            <div>
                <label>Temperature</label>
                <input id="cfg-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div>
                <label>Max Tokens</label>
                <input id="cfg-max-tokens" type="number" min="64" max="8192" step="64" value="2048">
            </div>
        </div>
        <button onclick="saveSettings()">Save</button>
    </div>

    <div id="model-info">Connecting...</div>
    <div id="chat"></div>
    <button id="scroll-bottom-btn" title="Scroll to bottom">&darr;</button>

    <div id="input-area">
        <button id="clear-btn" title="Clear conversation">&#128465;</button>
        <textarea id="message-input" placeholder="Message Nemotron..." rows="1"></textarea>
        <button id="send-btn" disabled>&#10148;</button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusDot = document.getElementById('status-dot');
        const modelInfo = document.getElementById('model-info');
        const modelSelect = document.getElementById('model-select');
        const scrollBottomBtn = document.getElementById('scroll-bottom-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');

        let isSending = false;
        let currentModel = '';
        let temperature = 0.7;
        let maxTokens = 2048;

        marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

        // Settings toggle
        settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));

        function saveSettings() {
            const sysprompt = document.getElementById('cfg-system-prompt').value;
            temperature = parseFloat(document.getElementById('cfg-temperature').value) || 0.7;
            maxTokens = parseInt(document.getElementById('cfg-max-tokens').value) || 2048;

            fetch(`${API_BASE}/api/config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ system_prompt: sysprompt })
            }).then(() => settingsPanel.classList.remove('open'));
        }

        // Scroll button
        function updateScrollButton() {
            const threshold = 100;
            const isNearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;
            scrollBottomBtn.classList.toggle('visible', !isNearBottom);
        }
        chat.addEventListener('scroll', updateScrollButton);
        scrollBottomBtn.addEventListener('click', () => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }));

        // Auto-resize
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            sendBtn.disabled = !input.value.trim();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled && !isSending) sendMessage();
            }
        });

        sendBtn.addEventListener('click', () => { if (!isSending) sendMessage(); });

        clearBtn.addEventListener('click', async () => {
            if (!confirm('Clear conversation?')) return;
            await fetch(`${API_BASE}/api/clear`, { method: 'POST' });
            chat.innerHTML = '';
        });

        function addMessage(content, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            if (role === 'user') {
                msg.textContent = content;
            } else if (role === 'assistant') {
                msg.innerHTML = marked.parse(content);
                renderMathInElement(msg, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\[', right: '\\]', display: true },
                        { left: '\\(', right: '\\)', display: false }
                    ],
                    throwOnError: false
                });
                // Wrap tables
                msg.querySelectorAll('table').forEach(table => {
                    const wrap = document.createElement('div');
                    wrap.className = 'table-wrap';
                    table.parentNode.insertBefore(wrap, table);
                    wrap.appendChild(table);
                });
                // Copy button
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.title = 'Copy';
                btn.textContent = '\u2398';
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(content).then(() => {
                        btn.textContent = '\u2713';
                        btn.classList.add('copied');
                        setTimeout(() => { btn.textContent = '\u2398'; btn.classList.remove('copied'); }, 1500);
                    });
                });
                msg.appendChild(btn);
            } else if (role === 'reasoning') {
                msg.textContent = content;
            }

            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        function setStatus(text, type) {
            statusDot.className = 'status-dot ' + type;
            statusDot.title = text;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            isSending = true;
            sendBtn.disabled = true;
            input.value = '';
            input.style.height = 'auto';

            addMessage(text, 'user');

            // Typing indicator
            const typingMsg = document.createElement('div');
            typingMsg.className = 'message assistant typing';
            typingMsg.textContent = 'Thinking...';
            chat.appendChild(typingMsg);
            chat.scrollTop = chat.scrollHeight;

            let responseChunks = [];
            let reasoningChunks = [];
            let reasoningMsg = null;
            let responseMsg = null;

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        model: modelSelect.value || currentModel,
                        temperature,
                        max_tokens: maxTokens,
                    })
                });

                typingMsg.remove();

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(line.slice(6));

                            if (event.type === 'reasoning') {
                                reasoningChunks.push(event.content);
                                if (!reasoningMsg) {
                                    reasoningMsg = document.createElement('div');
                                    reasoningMsg.className = 'message reasoning';
                                    chat.appendChild(reasoningMsg);
                                }
                                reasoningMsg.textContent = reasoningChunks.join('');
                                chat.scrollTop = chat.scrollHeight;
                            } else if (event.type === 'content') {
                                responseChunks.push(event.content);
                                if (!responseMsg) {
                                    responseMsg = document.createElement('div');
                                    responseMsg.className = 'message assistant';
                                    chat.appendChild(responseMsg);
                                }
                                responseMsg.innerHTML = marked.parse(responseChunks.join(''));
                                chat.scrollTop = chat.scrollHeight;
                            } else if (event.type === 'usage') {
                                if (responseMsg) {
                                    const badge = document.createElement('div');
                                    badge.className = 'token-badge';
                                    badge.textContent = `\u26A1 ${(event.prompt_tokens || 0).toLocaleString()} in / ${(event.completion_tokens || 0).toLocaleString()} out`;
                                    responseMsg.appendChild(badge);
                                }
                            } else if (event.type === 'error') {
                                addMessage('Error: ' + event.message, 'assistant');
                            } else if (event.type === 'done') {
                                // Finalize markdown rendering with KaTeX
                                if (responseMsg) {
                                    renderMathInElement(responseMsg, {
                                        delimiters: [
                                            { left: '$$', right: '$$', display: true },
                                            { left: '$', right: '$', display: false },
                                        ],
                                        throwOnError: false
                                    });
                                    // Add copy button
                                    const fullContent = responseChunks.join('');
                                    const btn = document.createElement('button');
                                    btn.className = 'copy-btn';
                                    btn.title = 'Copy';
                                    btn.textContent = '\u2398';
                                    btn.addEventListener('click', () => {
                                        navigator.clipboard.writeText(fullContent).then(() => {
                                            btn.textContent = '\u2713';
                                            btn.classList.add('copied');
                                            setTimeout(() => { btn.textContent = '\u2398'; btn.classList.remove('copied'); }, 1500);
                                        });
                                    });
                                    responseMsg.appendChild(btn);
                                }
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {
                typingMsg.remove();
                addMessage('Connection error: ' + e.message, 'assistant');
            }

            isSending = false;
            sendBtn.disabled = !input.value.trim();
        }

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.status === 'connected') {
                    setStatus('Connected to ' + data.model, 'connected');
                    modelInfo.textContent = `${data.model} @ ${data.api_base}`;
                    currentModel = data.model;
                } else {
                    setStatus('Disconnected', 'error');
                    modelInfo.textContent = 'Disconnected from inference server';
                }
            } catch (e) {
                setStatus('Offline', 'error');
                modelInfo.textContent = 'Server offline';
            }
        }

        async function loadModels() {
            try {
                const res = await fetch(`${API_BASE}/api/models`);
                const data = await res.json();
                const models = data.data || [];
                modelSelect.innerHTML = '';
                for (const m of models) {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.id;
                    if (m.id === currentModel) opt.selected = true;
                    modelSelect.appendChild(opt);
                }
            } catch (e) {
                modelSelect.innerHTML = '<option>--</option>';
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/history`);
                const history = await res.json();
                for (const msg of history) {
                    addMessage(msg.content, msg.role);
                }
            } catch (e) {}
        }

        async function loadConfig() {
            try {
                const res = await fetch(`${API_BASE}/api/config`);
                const cfg = await res.json();
                document.getElementById('cfg-system-prompt').value = cfg.system_prompt || '';
            } catch (e) {}
        }

        // Theme
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
            themeToggle.textContent = theme === 'light' ? '\u263D' : '\u263C';
            localStorage.setItem('nemo-theme', theme);
        }
        themeToggle.addEventListener('click', () => {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });
        applyTheme(localStorage.getItem('nemo-theme') || 'dark');

        // Init
        checkStatus();
        loadHistory();
        loadConfig();
        setTimeout(loadModels, 500);
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
