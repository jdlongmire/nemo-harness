<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nemo Harness</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nemo">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: #0d2540;
            padding: 8px 12px;
            border-bottom: 1px solid #1a4a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            z-index: 200;
        }

        #sidebar-toggle {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #aaa;
            padding: 4px 6px;
            border-radius: 4px;
            flex-shrink: 0;
            line-height: 1;
        }
        #sidebar-toggle:hover { color: #fff; background: rgba(255,255,255,0.08); }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #76b900;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; flex-shrink: 0; }
        .status-dot.connected { background: #76b900; box-shadow: 0 0 6px #76b900, 0 0 12px rgba(118,185,0,0.4); animation: glow 2s ease-in-out infinite alternate; }
        .status-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
        @keyframes glow { from { box-shadow: 0 0 4px #76b900, 0 0 8px rgba(118,185,0,0.3); } to { box-shadow: 0 0 8px #76b900, 0 0 16px rgba(118,185,0,0.5); } }

        #model-select {
            background: #0a1a2e;
            border: 1px solid #1a4a3a;
            color: #aaa;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            max-width: 200px;
            flex-shrink: 1;
            min-width: 0;
        }

        .header-spacer { flex: 1; }

        #mute-toggle { background: none; border: none; font-size: 16px; cursor: pointer; color: #aaa; line-height: 1; padding: 4px; flex-shrink: 0; opacity: 0.6; }
        #mute-toggle:hover { opacity: 1; color: #fff; }
        #mute-toggle.muted { color: #f87171; opacity: 0.8; }

        #settings-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #aaa; padding: 4px; flex-shrink: 0; }
        #settings-btn:hover { color: #fff; }

        #theme-toggle { background: none; border: none; font-size: 18px; cursor: pointer; color: #aaa; line-height: 1; padding: 4px; flex-shrink: 0; }
        #theme-toggle:hover { transform: scale(1.15); color: #fff; }

        /* ===== SIDEBAR ===== */
        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 300;
        }
        #sidebar-overlay.active { display: block; }

        #sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 280px;
            background: #0d2540;
            border-right: 1px solid #1a4a3a;
            z-index: 310;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #1a4a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #76b900;
            flex: 1;
        }

        #new-convo-btn {
            background: #76b900;
            color: #fff;
            border: none;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
        }
        #new-convo-btn:hover { background: #8ad600; }

        #convo-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .convo-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 2px;
        }
        .convo-item:hover { background: rgba(118,185,0,0.08); }
        .convo-item.active { background: rgba(118,185,0,0.15); }

        .convo-title {
            flex: 1;
            font-size: 13px;
            color: #ccc;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .convo-item.active .convo-title { color: #76b900; }

        .convo-date {
            font-size: 10px;
            color: #666;
            flex-shrink: 0;
        }

        .convo-delete {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }
        .convo-item:hover .convo-delete { opacity: 0.7; }
        .convo-delete:hover { opacity: 1 !important; color: #f87171; }

        /* ===== SETTINGS PANEL ===== */
        #settings-panel {
            display: none;
            background: #0d2540;
            border-bottom: 1px solid #1a4a3a;
            padding: 12px 16px;
            font-size: 12px;
            flex-shrink: 0;
        }
        #settings-panel.open { display: block; }
        #settings-panel label { display: block; color: #aaa; margin-bottom: 4px; margin-top: 8px; }
        #settings-panel label:first-child { margin-top: 0; }
        #settings-panel input, #settings-panel textarea {
            width: 100%;
            background: #0a1a2e;
            border: 1px solid #1a4a3a;
            color: #eee;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }
        #settings-panel textarea { resize: vertical; min-height: 60px; }
        .settings-row { display: flex; gap: 12px; }
        .settings-row > div { flex: 1; }
        #settings-panel button {
            margin-top: 8px;
            background: #76b900;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #model-info {
            font-size: 11px;
            color: #666;
            padding: 2px 12px;
            background: #0d2540;
            border-bottom: 1px solid #1a4a3a;
            flex-shrink: 0;
        }

        /* ===== CHAT ===== */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            min-width: 0;
            position: relative;
        }

        .message.user {
            background: #1a4a3a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #0d2540;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.reasoning {
            background: #1a1a30;
            border-left: 3px solid #6366f1;
            align-self: flex-start;
            font-size: 13px;
            color: #a5b4fc;
            max-width: 90%;
        }

        .message.assistant pre {
            background: #071520;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
            font-size: 13px;
        }

        .message.assistant p code {
            background: #071520;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message.typing {
            color: #888;
            font-style: italic;
        }

        /* ===== MESSAGE ACTIONS ===== */
        .copy-btn { position: absolute; bottom: 6px; right: 8px; background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; }
        .message:hover .copy-btn, .copy-btn:active { opacity: 1; }
        @media (hover: none) { .copy-btn { opacity: 0.5; } }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #aaa; }
        .copy-btn.copied { color: #76b900; opacity: 1; }

        .eval-btns { position: absolute; bottom: 6px; right: 52px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
        .message:hover .eval-btns { opacity: 1; }
        .eval-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; opacity: 0.5; transition: opacity 0.15s; }
        .eval-btn:hover:not(:disabled) { opacity: 1; background: rgba(255,255,255,0.08); }
        .eval-btn.eval-selected { opacity: 1; }
        .eval-btn:disabled { cursor: default; }

        .regen-btn { position: absolute; bottom: -18px; right: 8px; background: none; border: none; font-size: 11px; color: #76b900; opacity: 0; cursor: pointer; padding: 2px 6px; line-height: 1; transition: opacity 0.15s; white-space: nowrap; }
        .message.assistant:hover .regen-btn { opacity: 0.7; }
        .regen-btn:hover { opacity: 1 !important; }

        .edit-btn { position: absolute; bottom: -18px; right: 0; background: none; border: none; font-size: 11px; color: #76b900; opacity: 0; cursor: pointer; padding: 2px 6px; line-height: 1; transition: opacity 0.15s; white-space: nowrap; }
        .message.user:hover .edit-btn { opacity: 0.7; }
        .edit-btn:hover { opacity: 1 !important; }

        /* ===== MARKDOWN ===== */
        .message.assistant h1, .message.assistant h2, .message.assistant h3 { margin: 12px 0 8px 0; font-weight: 600; }
        .message.assistant h1 { font-size: 1.3em; }
        .message.assistant h2 { font-size: 1.15em; }
        .message.assistant h3 { font-size: 1.05em; }
        .message.assistant ul, .message.assistant ol { margin: 8px 0; padding-left: 24px; }
        .message.assistant li { margin: 4px 0; }
        .message.assistant blockquote { border-left: 3px solid #76b900; padding-left: 12px; margin: 8px 0; color: #aaa; }
        .message.assistant a { color: #60a5fa; text-decoration: none; }
        .message.assistant a:hover { text-decoration: underline; }
        .message.assistant strong { color: #fff; }
        .message.assistant hr { border: none; border-top: 1px solid #374151; margin: 12px 0; }
        .message.assistant .table-wrap { overflow-x: auto; margin: 8px 0; -webkit-overflow-scrolling: touch; }
        .message.assistant table { border-collapse: collapse; width: 100%; }
        .message.assistant th, .message.assistant td { border: 1px solid #374151; padding: 6px 10px; text-align: left; }
        .message.assistant th { background: #374151; }
        .message.assistant img { max-width: 100%; border-radius: 8px; margin: 8px 0; cursor: pointer; }

        .token-badge { font-size: 10px; color: #666; margin-top: 4px; padding: 2px 8px; display: inline-block; }

        /* ===== INPUT AREA ===== */
        #input-area {
            padding: 12px 16px;
            background: #0d2540;
            border-top: 1px solid #1a4a3a;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #message-input {
            flex: 1;
            min-width: 0;
            background: #0a1a2e;
            border: 1px solid #1a4a3a;
            border-radius: 20px;
            padding: 10px 14px;
            color: #eee;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            font-family: inherit;
        }

        #message-input:focus { border-color: #76b900; }

        #send-btn {
            background: #76b900;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            min-width: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }

        #send-btn:disabled { background: #555; cursor: not-allowed; }
        #send-btn:active:not(:disabled) { transform: scale(0.95); }

        #clear-btn {
            background: none;
            border: 1px solid #333;
            color: #888;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            min-width: 40px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s, color 0.15s;
        }
        #clear-btn:hover { border-color: #f87171; color: #f87171; }

        /* ===== IMAGE MODAL ===== */
        .image-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .image-modal img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .image-modal.active { display: flex; }

        /* ===== SCROLL TO BOTTOM ===== */
        #scroll-bottom-btn {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 36px; border-radius: 50%;
            background: #f5f5f0; border: 1px solid #e0e0dc; color: #333;
            font-size: 18px; cursor: pointer; display: none; align-items: center;
            justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 100;
            transition: opacity 0.2s, transform 0.2s;
        }
        #scroll-bottom-btn.visible { display: flex; }
        #scroll-bottom-btn:hover { background: #eaeae5; transform: translateX(-50%) scale(1.05); }

        /* ===== LIGHT THEME ===== */
        body.light { background: #f5f0e8; color: #222; }
        body.light header { background: #ede8df; border-bottom-color: #c8d8d5; }
        body.light header h1 { color: #4a7c10; }
        body.light #sidebar-toggle { color: #555; }
        body.light #sidebar-toggle:hover { color: #111; background: rgba(0,0,0,0.06); }
        body.light #sidebar { background: #ede8df; border-right-color: #c8d8d5; }
        body.light .sidebar-header { border-bottom-color: #c8d8d5; }
        body.light .sidebar-header h2 { color: #4a7c10; }
        body.light .convo-item:hover { background: rgba(74,124,16,0.08); }
        body.light .convo-item.active { background: rgba(74,124,16,0.15); }
        body.light .convo-title { color: #555; }
        body.light .convo-item.active .convo-title { color: #4a7c10; }
        body.light .convo-delete { color: #aaa; }
        body.light .message.user { background: #dde8e6; color: #222; }
        body.light .message.assistant { background: #ede8df; color: #222; border: 1px solid #c8d8d5; }
        body.light .message.reasoning { background: #eef0ff; color: #4338ca; border-left-color: #6366f1; }
        body.light .message.assistant pre { background: #e5e0d6; }
        body.light .message.assistant p code { background: #e5e0d6; }
        body.light .message.assistant strong { color: #111; }
        body.light .message.assistant blockquote { color: #666; }
        body.light .message.assistant a { color: #0284c7; }
        body.light .message.assistant th { background: #c8d8d5; color: #222; }
        body.light .message.assistant th, body.light .message.assistant td { border-color: #c8d8d5; }
        body.light #chat { background: #f5f0e8; }
        body.light #input-area { background: #ede8df; border-top-color: #c8d8d5; }
        body.light #message-input { background: #f5f0e8; border-color: #c8d8d5; color: #222; }
        body.light #message-input:focus { border-color: #4a7c10; }
        body.light #model-info { background: #ede8df; border-bottom-color: #c8d8d5; color: #888; }
        body.light #model-select { background: #f5f0e8; border-color: #c8d8d5; color: #555; }
        body.light #settings-panel { background: #ede8df; border-bottom-color: #c8d8d5; }
        body.light #settings-panel input, body.light #settings-panel textarea { background: #f5f0e8; border-color: #c8d8d5; color: #222; }
        body.light .token-badge { color: #888; }
        body.light .copy-btn { color: #888; }
        body.light .copy-btn:hover { background: rgba(0,0,0,0.06); color: #444; }
        body.light .copy-btn.copied { color: #4a7c10; }
        body.light .edit-btn { color: #4a7c10; }
        body.light .regen-btn { color: #4a7c10; }
        body.light #mute-toggle { color: #555; }
        body.light #mute-toggle:hover { color: #111; }
        body.light #mute-toggle.muted { color: #be123c; }
        body.light #theme-toggle { color: #555; }
        body.light #theme-toggle:hover { color: #111; }
        body.light #settings-btn { color: #555; }
        body.light #settings-btn:hover { color: #111; }
        body.light #sidebar-overlay { background: rgba(0,0,0,0.3); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            header h1 { font-size: 14px; }
            #model-select { max-width: 120px; font-size: 10px; }
            .message { max-width: 92%; }
            #sidebar { width: 260px; }
        }
    </style>
</head>
<body>
    <!-- Sidebar overlay -->
    <div id="sidebar-overlay"></div>

    <!-- Conversation sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Conversations</h2>
            <button id="new-convo-btn">+ New</button>
        </div>
        <div id="convo-list"></div>
    </div>

    <header>
        <button id="sidebar-toggle" title="Conversations">&#9776;</button>
        <h1>&#9881; Nemo Harness</h1>
        <select id="model-select" title="Select model"></select>
        <div class="header-spacer"></div>
        <button id="mute-toggle" title="Mute notification sounds">&#128264;</button>
        <button id="settings-btn" title="Settings">&#9881;</button>
        <button id="theme-toggle" title="Toggle theme">&#9788;</button>
        <div class="status-dot" id="status-dot" title="Connecting..."></div>
    </header>

    <div id="settings-panel">
        <label>System Prompt</label>
        <textarea id="cfg-system-prompt" rows="3"></textarea>
        <div class="settings-row">
            <div>
                <label>Temperature</label>
                <input id="cfg-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div>
                <label>Max Tokens</label>
                <input id="cfg-max-tokens" type="number" min="64" max="8192" step="64" value="2048">
            </div>
        </div>
        <button onclick="saveSettings()">Save</button>
    </div>

    <div id="model-info">Connecting...</div>
    <div id="chat"></div>
    <button id="scroll-bottom-btn" title="Scroll to bottom">&darr;</button>

    <div id="input-area">
        <button id="clear-btn" title="Clear conversation">&#128465;</button>
        <textarea id="message-input" placeholder="Message Nemotron..." rows="1"></textarea>
        <button id="send-btn" disabled>&#10148;</button>
    </div>

    <!-- Image modal -->
    <div class="image-modal" id="image-modal">
        <img src="" alt="Fullscreen image">
    </div>

    <script>
        // ===== CONSTANTS & DOM REFS =====
        const API_BASE = window.location.origin;
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusDot = document.getElementById('status-dot');
        const modelInfo = document.getElementById('model-info');
        const modelSelect = document.getElementById('model-select');
        const scrollBottomBtn = document.getElementById('scroll-bottom-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const newConvoBtn = document.getElementById('new-convo-btn');
        const convoList = document.getElementById('convo-list');
        const imageModal = document.getElementById('image-modal');
        const modalImg = imageModal.querySelector('img');
        const muteToggle = document.getElementById('mute-toggle');

        // ===== STATE =====
        let isSending = false;
        let currentModel = '';
        let temperature = 0.7;
        let maxTokens = 2048;
        let turnIndex = 0;
        let pendingEditTurn = null;
        let currentConvoId = null;
        let isMuted = localStorage.getItem('nemo-muted') === 'true';

        // Session ID for evaluations
        if (!sessionStorage.getItem('nemo-session-id')) {
            sessionStorage.setItem('nemo-session-id', crypto.randomUUID());
        }
        const SESSION_ID = sessionStorage.getItem('nemo-session-id');

        // ===== MARKED CONFIG =====
        marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

        // ===== SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // ===== MUTE TOGGLE =====
        function applyMute() {
            muteToggle.classList.toggle('muted', isMuted);
            muteToggle.innerHTML = isMuted ? '&#128263;' : '&#128264;';
            localStorage.setItem('nemo-muted', isMuted);
        }
        muteToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            applyMute();
        });
        applyMute();

        // ===== THEME =====
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
            themeToggle.textContent = theme === 'light' ? '\u263D' : '\u263C';
            localStorage.setItem('nemo-theme', theme);
        }
        themeToggle.addEventListener('click', () => {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });
        applyTheme(localStorage.getItem('nemo-theme') || 'dark');

        // ===== SIDEBAR =====
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });
        sidebarOverlay.addEventListener('click', closeSidebar);

        // ===== CONVERSATION MANAGEMENT =====
        function getConversations() {
            try {
                return JSON.parse(localStorage.getItem('nemo-conversations') || '[]');
            } catch { return []; }
        }

        function saveConversations(convos) {
            localStorage.setItem('nemo-conversations', JSON.stringify(convos));
        }

        function generateConvoId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        }

        function getConvoTitle(messages) {
            const firstUser = messages.find(m => m.role === 'user');
            if (!firstUser) return 'New conversation';
            return firstUser.content.slice(0, 50) + (firstUser.content.length > 50 ? '...' : '');
        }

        function getCurrentMessages() {
            const messages = [];
            chat.querySelectorAll('.message').forEach(el => {
                if (el.classList.contains('user')) {
                    messages.push({ role: 'user', content: el.dataset.raw || el.textContent });
                } else if (el.classList.contains('assistant') && !el.classList.contains('typing')) {
                    messages.push({ role: 'assistant', content: el.dataset.raw || '' });
                } else if (el.classList.contains('reasoning')) {
                    messages.push({ role: 'reasoning', content: el.textContent });
                }
            });
            return messages;
        }

        function autoSaveConversation() {
            const messages = getCurrentMessages();
            if (messages.length === 0) return;

            const convos = getConversations();
            const now = new Date().toISOString();

            if (currentConvoId) {
                const idx = convos.findIndex(c => c.id === currentConvoId);
                if (idx >= 0) {
                    convos[idx].messages = messages;
                    convos[idx].updated = now;
                    convos[idx].title = getConvoTitle(messages);
                }
            } else {
                currentConvoId = generateConvoId();
                convos.unshift({
                    id: currentConvoId,
                    title: getConvoTitle(messages),
                    messages,
                    created: now,
                    updated: now,
                });
            }
            saveConversations(convos);
            renderConvoList();

            // Also save to server
            fetch(`${API_BASE}/api/conversations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: currentConvoId,
                    title: getConvoTitle(messages),
                    messages,
                }),
            }).catch(() => {});
        }

        function renderConvoList() {
            const convos = getConversations();
            convoList.innerHTML = '';
            for (const c of convos) {
                const item = document.createElement('div');
                item.className = 'convo-item' + (c.id === currentConvoId ? ' active' : '');
                const dateStr = new Date(c.updated || c.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                item.innerHTML = `
                    <span class="convo-title">${escapeHtml(c.title)}</span>
                    <span class="convo-date">${dateStr}</span>
                    <button class="convo-delete" title="Delete">&times;</button>
                `;
                item.querySelector('.convo-title').addEventListener('click', () => loadConversation(c.id));
                item.querySelector('.convo-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(c.id);
                });
                convoList.appendChild(item);
            }
        }

        function loadConversation(id) {
            const convos = getConversations();
            const convo = convos.find(c => c.id === id);
            if (!convo) return;

            currentConvoId = id;
            chat.innerHTML = '';
            turnIndex = 0;

            // Clear server history
            fetch(`${API_BASE}/api/clear`, { method: 'POST' }).catch(() => {});

            for (const msg of convo.messages) {
                if (msg.role === 'reasoning') {
                    addMessage(msg.content, 'reasoning');
                } else {
                    addMessage(msg.content, msg.role);
                }
            }

            // Re-send history to server for context
            const chatMessages = convo.messages.filter(m => m.role === 'user' || m.role === 'assistant');
            fetch(`${API_BASE}/api/history/restore`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatMessages }),
            }).catch(() => {});

            renderConvoList();
            closeSidebar();
        }

        function deleteConversation(id) {
            let convos = getConversations();
            convos = convos.filter(c => c.id !== id);
            saveConversations(convos);

            if (id === currentConvoId) {
                currentConvoId = null;
                chat.innerHTML = '';
                turnIndex = 0;
                fetch(`${API_BASE}/api/clear`, { method: 'POST' }).catch(() => {});
            }

            // Also delete from server
            fetch(`${API_BASE}/api/conversations/${id}`, { method: 'DELETE' }).catch(() => {});

            renderConvoList();
        }

        function startNewConversation() {
            // Save current if it has messages
            autoSaveConversation();

            currentConvoId = null;
            chat.innerHTML = '';
            turnIndex = 0;
            fetch(`${API_BASE}/api/clear`, { method: 'POST' }).catch(() => {});
            renderConvoList();
            closeSidebar();
            input.focus();
        }

        newConvoBtn.addEventListener('click', startNewConversation);

        // ===== SETTINGS =====
        settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));

        function saveSettings() {
            const sysprompt = document.getElementById('cfg-system-prompt').value;
            temperature = parseFloat(document.getElementById('cfg-temperature').value) || 0.7;
            maxTokens = parseInt(document.getElementById('cfg-max-tokens').value) || 2048;

            fetch(`${API_BASE}/api/config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ system_prompt: sysprompt })
            }).then(() => settingsPanel.classList.remove('open'));
        }

        // ===== IMAGE MODAL =====
        imageModal.addEventListener('click', () => imageModal.classList.remove('active'));

        function openImageModal(src) {
            modalImg.src = src;
            imageModal.classList.add('active');
        }

        // ===== SCROLL BUTTON =====
        function updateScrollButton() {
            const threshold = 100;
            const isNearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < threshold;
            scrollBottomBtn.classList.toggle('visible', !isNearBottom);
        }
        chat.addEventListener('scroll', updateScrollButton);
        scrollBottomBtn.addEventListener('click', () => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }));

        // ===== INPUT =====
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            sendBtn.disabled = !input.value.trim();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled && !isSending) sendMessage();
            }
        });

        sendBtn.addEventListener('click', () => { if (!isSending) sendMessage(); });

        clearBtn.addEventListener('click', () => {
            if (!confirm('Clear conversation?')) return;
            fetch(`${API_BASE}/api/clear`, { method: 'POST' });
            chat.innerHTML = '';
            turnIndex = 0;
            currentConvoId = null;
            renderConvoList();
        });

        // ===== UTILITIES =====
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== ADD MESSAGE =====
        function addMessage(content, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            if (role === 'user') {
                const thisTurn = turnIndex++;
                msg.dataset.turn = thisTurn;
                msg.dataset.raw = content;
                msg.textContent = content;

                // Edit button
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.textContent = 'Edit';
                editBtn.addEventListener('click', () => startEdit(thisTurn, content));
                msg.appendChild(editBtn);

            } else if (role === 'assistant') {
                msg.dataset.raw = content;
                msg.innerHTML = marked.parse(content);

                // Render KaTeX
                renderMathInElement(msg, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\[', right: '\\]', display: true },
                        { left: '\\(', right: '\\)', display: false }
                    ],
                    throwOnError: false
                });

                // Wrap tables
                msg.querySelectorAll('table').forEach(table => {
                    const wrap = document.createElement('div');
                    wrap.className = 'table-wrap';
                    table.parentNode.insertBefore(wrap, table);
                    wrap.appendChild(table);
                });

                // Click images to open modal
                msg.querySelectorAll('img').forEach(img => {
                    img.addEventListener('click', () => openImageModal(img.src));
                });

                // Copy button
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.title = 'Copy';
                copyBtn.textContent = '\u2398';
                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(content).then(() => {
                        copyBtn.textContent = '\u2713';
                        copyBtn.classList.add('copied');
                        setTimeout(() => { copyBtn.textContent = '\u2398'; copyBtn.classList.remove('copied'); }, 1500);
                    }).catch(() => {
                        // Fallback
                        const ta = document.createElement('textarea');
                        ta.value = content;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        copyBtn.textContent = '\u2713';
                        copyBtn.classList.add('copied');
                        setTimeout(() => { copyBtn.textContent = '\u2398'; copyBtn.classList.remove('copied'); }, 1500);
                    });
                });
                msg.appendChild(copyBtn);

                // Eval buttons (thumbs up/down)
                const evalWrap = document.createElement('span');
                evalWrap.className = 'eval-btns';
                evalWrap._rawContent = content;
                [['👍', 1], ['👎', -1]].forEach(([icon, score]) => {
                    const eb = document.createElement('button');
                    eb.className = 'eval-btn';
                    eb.title = score === 1 ? 'Good response' : 'Poor response';
                    eb.textContent = icon;
                    eb.addEventListener('click', async () => {
                        if (evalWrap.dataset.scored) return;
                        evalWrap.dataset.scored = '1';
                        evalWrap.querySelectorAll('.eval-btn').forEach(b => b.disabled = true);
                        eb.classList.add('eval-selected');
                        await fetch(`${API_BASE}/api/evaluate`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                score,
                                session_id: SESSION_ID,
                                message_preview: content.slice(0, 200),
                            })
                        }).catch(() => {});
                    });
                    evalWrap.appendChild(eb);
                });
                msg.appendChild(evalWrap);

                // Regenerate button (only on last assistant message; updated dynamically)
                const regenBtn = document.createElement('button');
                regenBtn.className = 'regen-btn';
                regenBtn.textContent = 'Regenerate';
                regenBtn.addEventListener('click', () => regenerateLastResponse());
                msg.appendChild(regenBtn);

            } else if (role === 'reasoning') {
                msg.textContent = content;
            }

            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        // ===== EDIT MESSAGE =====
        function startEdit(turn, rawContent) {
            if (isSending) return;
            const msgEl = chat.querySelector(`.message.user[data-turn="${turn}"]`);
            if (!msgEl) return;

            // Remove target message and everything after it
            let el = msgEl;
            while (el) {
                const next = el.nextSibling;
                chat.removeChild(el);
                el = next;
            }

            turnIndex = turn;
            pendingEditTurn = turn;
            input.value = rawContent;
            input.dispatchEvent(new Event('input'));
            input.focus();

            // Auto-save after edit removes messages
            autoSaveConversation();
        }

        // ===== REGENERATE =====
        function regenerateLastResponse() {
            if (isSending) return;

            // Find the last assistant message
            const assistantMsgs = chat.querySelectorAll('.message.assistant:not(.typing)');
            if (assistantMsgs.length === 0) return;
            const lastAssistant = assistantMsgs[assistantMsgs.length - 1];

            // Find the preceding reasoning message if any
            let prevEl = lastAssistant.previousElementSibling;
            if (prevEl && prevEl.classList.contains('reasoning')) {
                prevEl.remove();
            }

            // Find the user message that preceded this response
            const allMsgs = Array.from(chat.querySelectorAll('.message'));
            const assistantIdx = allMsgs.indexOf(lastAssistant);
            let userMsg = null;
            for (let i = assistantIdx - 1; i >= 0; i--) {
                if (allMsgs[i].classList.contains('user')) {
                    userMsg = allMsgs[i];
                    break;
                }
            }

            if (!userMsg) return;
            const userText = userMsg.dataset.raw || userMsg.textContent;

            // Remove the assistant message
            lastAssistant.remove();

            // Re-send the user message (without adding it to chat again)
            doSendMessage(userText, true);
        }

        // ===== STATUS =====
        function setStatus(text, type) {
            statusDot.className = 'status-dot ' + type;
            statusDot.title = text;
        }

        // ===== SEND MESSAGE =====
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            addMessage(text, 'user');
            pendingEditTurn = null;

            await doSendMessage(text, false);
        }

        async function doSendMessage(text, isRegenerate) {
            isSending = true;
            sendBtn.disabled = true;

            // Typing indicator
            const typingMsg = document.createElement('div');
            typingMsg.className = 'message assistant typing';
            typingMsg.textContent = 'Thinking...';
            chat.appendChild(typingMsg);
            chat.scrollTop = chat.scrollHeight;

            let responseChunks = [];
            let reasoningChunks = [];
            let reasoningMsg = null;
            let responseMsg = null;

            try {
                const payload = {
                    message: text,
                    model: modelSelect.value || currentModel,
                    temperature,
                    max_tokens: maxTokens,
                };
                if (isRegenerate) {
                    payload.regenerate = true;
                }

                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                typingMsg.remove();

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const event = JSON.parse(line.slice(6));

                            if (event.type === 'reasoning') {
                                reasoningChunks.push(event.content);
                                if (!reasoningMsg) {
                                    reasoningMsg = document.createElement('div');
                                    reasoningMsg.className = 'message reasoning';
                                    chat.appendChild(reasoningMsg);
                                }
                                reasoningMsg.textContent = reasoningChunks.join('');
                                chat.scrollTop = chat.scrollHeight;
                            } else if (event.type === 'content') {
                                responseChunks.push(event.content);
                                if (!responseMsg) {
                                    responseMsg = document.createElement('div');
                                    responseMsg.className = 'message assistant';
                                    chat.appendChild(responseMsg);
                                }
                                responseMsg.innerHTML = marked.parse(responseChunks.join(''));
                                chat.scrollTop = chat.scrollHeight;
                            } else if (event.type === 'usage') {
                                if (responseMsg) {
                                    const badge = document.createElement('div');
                                    badge.className = 'token-badge';
                                    badge.textContent = `\u26A1 ${(event.prompt_tokens || 0).toLocaleString()} in / ${(event.completion_tokens || 0).toLocaleString()} out`;
                                    responseMsg.appendChild(badge);
                                }
                            } else if (event.type === 'error') {
                                addMessage('Error: ' + event.message, 'assistant');
                            } else if (event.type === 'done') {
                                // Finalize rendering
                                if (responseMsg) {
                                    const fullContent = responseChunks.join('');
                                    responseMsg.dataset.raw = fullContent;

                                    // Re-render with KaTeX
                                    renderMathInElement(responseMsg, {
                                        delimiters: [
                                            { left: '$$', right: '$$', display: true },
                                            { left: '$', right: '$', display: false },
                                            { left: '\\[', right: '\\]', display: true },
                                            { left: '\\(', right: '\\)', display: false }
                                        ],
                                        throwOnError: false
                                    });

                                    // Wrap tables
                                    responseMsg.querySelectorAll('table').forEach(table => {
                                        if (table.parentElement.classList.contains('table-wrap')) return;
                                        const wrap = document.createElement('div');
                                        wrap.className = 'table-wrap';
                                        table.parentNode.insertBefore(wrap, table);
                                        wrap.appendChild(table);
                                    });

                                    // Click images to open modal
                                    responseMsg.querySelectorAll('img').forEach(img => {
                                        img.addEventListener('click', () => openImageModal(img.src));
                                    });

                                    // Copy button
                                    const copyBtn = document.createElement('button');
                                    copyBtn.className = 'copy-btn';
                                    copyBtn.title = 'Copy';
                                    copyBtn.textContent = '\u2398';
                                    copyBtn.addEventListener('click', () => {
                                        navigator.clipboard.writeText(fullContent).then(() => {
                                            copyBtn.textContent = '\u2713';
                                            copyBtn.classList.add('copied');
                                            setTimeout(() => { copyBtn.textContent = '\u2398'; copyBtn.classList.remove('copied'); }, 1500);
                                        }).catch(() => {
                                            const ta = document.createElement('textarea');
                                            ta.value = fullContent;
                                            ta.style.position = 'fixed';
                                            ta.style.opacity = '0';
                                            document.body.appendChild(ta);
                                            ta.select();
                                            document.execCommand('copy');
                                            document.body.removeChild(ta);
                                            copyBtn.textContent = '\u2713';
                                            copyBtn.classList.add('copied');
                                            setTimeout(() => { copyBtn.textContent = '\u2398'; copyBtn.classList.remove('copied'); }, 1500);
                                        });
                                    });
                                    responseMsg.appendChild(copyBtn);

                                    // Eval buttons
                                    const evalWrap = document.createElement('span');
                                    evalWrap.className = 'eval-btns';
                                    evalWrap._rawContent = fullContent;
                                    [['👍', 1], ['👎', -1]].forEach(([icon, score]) => {
                                        const eb = document.createElement('button');
                                        eb.className = 'eval-btn';
                                        eb.title = score === 1 ? 'Good response' : 'Poor response';
                                        eb.textContent = icon;
                                        eb.addEventListener('click', async () => {
                                            if (evalWrap.dataset.scored) return;
                                            evalWrap.dataset.scored = '1';
                                            evalWrap.querySelectorAll('.eval-btn').forEach(b => b.disabled = true);
                                            eb.classList.add('eval-selected');
                                            await fetch(`${API_BASE}/api/evaluate`, {
                                                method: 'POST',
                                                headers: { 'Content-Type': 'application/json' },
                                                body: JSON.stringify({
                                                    score,
                                                    session_id: SESSION_ID,
                                                    message_preview: fullContent.slice(0, 200),
                                                })
                                            }).catch(() => {});
                                        });
                                        evalWrap.appendChild(eb);
                                    });
                                    responseMsg.appendChild(evalWrap);

                                    // Regenerate button
                                    const regenBtn = document.createElement('button');
                                    regenBtn.className = 'regen-btn';
                                    regenBtn.textContent = 'Regenerate';
                                    regenBtn.addEventListener('click', () => regenerateLastResponse());
                                    responseMsg.appendChild(regenBtn);
                                }

                                // Auto-save conversation
                                autoSaveConversation();
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {
                typingMsg.remove();
                addMessage('Connection error: ' + e.message, 'assistant');
            }

            isSending = false;
            sendBtn.disabled = !input.value.trim();
        }

        // ===== API: STATUS =====
        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                if (data.status === 'connected') {
                    setStatus('Connected to ' + data.model, 'connected');
                    modelInfo.textContent = `${data.model} @ ${data.api_base}`;
                    currentModel = data.model;
                } else {
                    setStatus('Disconnected', 'error');
                    modelInfo.textContent = 'Disconnected from inference server';
                }
            } catch (e) {
                setStatus('Offline', 'error');
                modelInfo.textContent = 'Server offline';
            }
        }

        // ===== API: MODELS =====
        async function loadModels() {
            try {
                const res = await fetch(`${API_BASE}/api/models`);
                const data = await res.json();
                const models = data.data || [];
                modelSelect.innerHTML = '';
                for (const m of models) {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.id;
                    if (m.id === currentModel) opt.selected = true;
                    modelSelect.appendChild(opt);
                }
            } catch (e) {
                modelSelect.innerHTML = '<option>--</option>';
            }
        }

        // ===== API: HISTORY =====
        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/history`);
                const history = await res.json();
                for (const msg of history) {
                    addMessage(msg.content, msg.role);
                }
            } catch (e) {}
        }

        // ===== API: CONFIG =====
        async function loadConfig() {
            try {
                const res = await fetch(`${API_BASE}/api/config`);
                const cfg = await res.json();
                document.getElementById('cfg-system-prompt').value = cfg.system_prompt || '';
            } catch (e) {}
        }

        // ===== INIT =====
        checkStatus();
        loadHistory();
        loadConfig();
        renderConvoList();
        setTimeout(loadModels, 500);
        setInterval(checkStatus, 30000);
    </script>
</body>
